function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── Parse workout description into blocks ─────────────────────────────────
function parsePaceRange(paceStr, zona, segDesc){
  const isStride = segDesc && /veloc|strides|subida|sprint|80m|60m/i.test(segDesc);
  if(isStride) return 'máx. esforço';
  if(!paceStr || paceStr==='—') return '';
  if(/veloc|máximo|máx/i.test(paceStr)) return 'máx. esforço';
  let clean = paceStr.replace(/[^\d:]/g,'').trim();
  if(!clean.includes(':')) return '';
  const sec = t2s(clean);
  if(!sec || sec < 120 || sec > 1200) return '';
  const pct = zona==='Z3'?0.04 : zona==='Z2'?0.05 : 0.08;
  const lo = Math.round(sec*(1-pct)), hi = Math.round(sec*(1+pct));
  return sp(lo)+' – '+sp(hi);
}

function parseWorkoutBlocks(descricao, paceStr, zona){
  if(!descricao) return [];
  const blocks = [];
  const zoneColor = zona==='Z1'?'var(--teal)':zona==='Z2'?'var(--orange)':zona==='Z3'?'var(--red)':'var(--teal)';
  const parts = descricao.split(/\s*\+\s*/);
  parts.forEach(part => {
    part = part.trim();
    if(!part) return;
    const commaParts = part.split(/,\s*/);
    const mainPart = commaParts[0].trim();
    const restPart = commaParts.slice(1).join(', ').trim();
    const paceMatch = mainPart.match(/(\d+:\d+)/);
    let segPace = paceMatch ? paceMatch[1] : '';
    let segDesc = mainPart.replace(/\d+:\d+/g,'').replace(/\s+/g,' ').trim();
    segDesc = segDesc.replace(/\/km$/i,'').replace(/min\/km$/i,'').trim();
    let segZona = zona;
    if(/aquec|warm/i.test(segDesc)) segZona='Z1';
    else if(/\bleve\b|desaquec/i.test(segDesc)) segZona='Z1';
    else if(/\britmo\b|tempo run|ritmado/i.test(segDesc) && !/tiro|sprint|veloc/i.test(segDesc)) segZona='Z2';
    else if(/tiro|veloc|sprint|strides|1000m|400m|200m|80m|60m/i.test(segDesc)) segZona='Z3';
    const segColor = segZona==='Z1'?'var(--teal)':segZona==='Z2'?'var(--orange)':segZona==='Z3'?'var(--red)':'var(--tx2)';
    const isNonRunning = /alongamento|aquecimento muscular|fortalec|mobilidade/i.test(segDesc);
    if(isNonRunning){ blocks.push({desc:segDesc, pace:'', color:'var(--tx3)', zona:'', isNonRunning:true}); return; }
    let finalPace = segPace ? parsePaceRange(segPace, segZona, segDesc) : '';
    if(!finalPace && segZona==='Z1') finalPace = 'Z1 confortável';
    blocks.push({desc:segDesc, pace:finalPace, color:segColor, zona:segZona});
    if(restPart && /caminh|recup|descanso|trote/i.test(restPart)){
      blocks.push({desc:'↩ descanso: '+restPart.replace(/\d+:\d+/g,'').trim(), pace:'', color:'var(--tx3)', zona:'Z1', isRest:true});
    }
  });
  return blocks.length>0 ? blocks : [{desc:descricao, pace:parsePaceRange(paceStr,zona,descricao), color:zoneColor, zona}];
}


function parseGPX(xml){
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const pts = [...doc.querySelectorAll('trkpt,rtept')];
  if(!pts.length) return null;

  // ── Timestamps ──
  const times = pts.map(p => {
    const t = p.querySelector('time');
    const d = t ? new Date(t.textContent.trim()) : null;
    return d && !isNaN(+d) ? d : null;
  });

  // ── Coordinates ──
  const lats = pts.map(p => { const v = parseFloat(p.getAttribute('lat')||''); return isNaN(v)?NaN:v; });
  const lons = pts.map(p => { const v = parseFloat(p.getAttribute('lon')||''); return isNaN(v)?NaN:v; });

  // ── HR ──
  const hrs = [];
  pts.forEach(p => {
    const tags = ['hr','HeartRateBpm','Value','heartrate'];
    let val = 0;
    for(const tag of tags){
      const el = p.querySelector(tag) ||
        p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v1', tag)[0] ||
        p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v2', tag)[0];
      if(el){ val = parseInt(el.textContent); break; }
    }
    if(val > 40 && val < 230) hrs.push(val);
  });

  // ── Cadence ──
  const cads = [];
  pts.forEach(p => {
    const tags = ['cad','RunCadence','Cadence'];
    let val = 0;
    for(const tag of tags){
      const el = p.querySelector(tag) ||
        p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v1', tag)[0] ||
        p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v2', tag)[0];
      if(el){ val = parseInt(el.textContent); break; }
    }
    if(val > 30 && val < 120) val = val * 2; // single-foot to both feet
    if(val > 100 && val < 240) cads.push(val);
  });

  // ── Elevation ──
  let elevGain = 0;
  const elevs = pts.map(p => { const el = p.querySelector('ele'); return el ? parseFloat(el.textContent) : NaN; });
  for(let i = 1; i < elevs.length; i++){
    if(!isNaN(elevs[i]) && !isNaN(elevs[i-1]) && elevs[i] - elevs[i-1] > 0.5)
      elevGain += elevs[i] - elevs[i-1];
  }

  // ── Distance via haversine ──
  let dist = 0, cumDist = 0;
  for(let i = 1; i < lats.length; i++){
    if(!isNaN(lats[i]) && !isNaN(lons[i]) && !isNaN(lats[i-1]) && !isNaN(lons[i-1])){
      const d = haversine(lats[i-1], lons[i-1], lats[i], lons[i]);
      dist += d; cumDist += d;
    }
  }
  dist = Math.round(dist * 100) / 100;

  // ── Duration ──
  const validTimes = times.filter(Boolean);
  const durSec = validTimes.length >= 2 ? (+validTimes[validTimes.length-1] - +validTimes[0]) / 1000 : 0;

  // ── Moving time (exclude stops > 30s) ──
  let movingTime = 0, pauseCount = 0;
  for(let i = 1; i < validTimes.length; i++){
    const gap = (+validTimes[i] - +validTimes[i-1]) / 1000;
    if(gap > 30) pauseCount++;
    else movingTime += gap;
  }

  // ── Pace per km (splits) ──
  const splits = [], splitPaces = [];
  let lastKm = 0, lastT = validTimes[0], splitCumDist = 0;
  for(let i = 1; i < pts.length; i++){
    if(isNaN(lats[i]) || isNaN(lons[i])) continue;
    splitCumDist += haversine(lats[i-1], lons[i-1], lats[i], lons[i]);
    if(splitCumDist >= lastKm + 1 && times[i] && lastT){
      const sec = (+times[i] - +lastT) / 1000;
      if(sec > 30 && sec < 1800){
        const paceSec = Math.round(sec);
        splits.push(sp(paceSec));
        splitPaces.push(paceSec);
      }
      lastT = times[i]; lastKm = Math.floor(splitCumDist);
    }
  }

  // ── Pace stats from splits ──
  const paceFastest = splitPaces.length ? sp(Math.min(...splitPaces)) : '';
  const paceSlowest = splitPaces.length ? sp(Math.max(...splitPaces)) : '';
  const paceOscillation = splitPaces.length > 1 ? Math.max(...splitPaces) - Math.min(...splitPaces) : 0;
  // Pacing trend: first half vs second half
  let pacingTrend = 'constante';
  if(splitPaces.length >= 2){
    const half = Math.floor(splitPaces.length / 2);
    const avgFirst = splitPaces.slice(0, half).reduce((a,b)=>a+b,0)/half;
    const avgLast = splitPaces.slice(half).reduce((a,b)=>a+b,0)/(splitPaces.length-half);
    const diff = avgLast - avgFirst;
    if(diff > 30) pacingTrend = 'negativo'; // getting slower = positive split
    else if(diff < -20) pacingTrend = 'negativo_split'; // getting faster = negative split
    else if(diff < -5) pacingTrend = 'progressivo';
  }

  // ── Fallbacks for distance ──
  if(dist < 0.1){
    const selectors = ['distance','Distance','totalDistance','TotalDistanceMeters','DistanceMeters'];
    for(const sel of selectors){
      try{ const el = doc.querySelector(sel); if(el){ const v = parseFloat(el.textContent); if(v > 0){ dist = v > 1000 ? Math.round(v/10)/100 : v; break; } } }catch(e){}
    }
  }
  if(dist < 0.1 && splitPaces.length > 0 && durSec > 0){
    const avgP = splitPaces.reduce((a,b)=>a+b,0)/splitPaces.length;
    if(avgP > 0) dist = Math.round(durSec/avgP*10)/10;
  }
  if(dist < 0.1 && cumDist > 0.1) dist = Math.round(cumDist*100)/100;

  const fcmed = hrs.length ? Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length) : 0;
  const fcmax = hrs.length ? Math.max(...hrs) : 0;
  const cadAvg = cads.length ? Math.round(cads.reduce((a,b)=>a+b,0)/cads.length) : 0;
  const cadMax = cads.length ? Math.max(...cads) : 0;
  const avgPaceSec = dist > 0 && durSec > 0 ? Math.round(durSec/dist) : 0;

  return {
    dist, durSec, movingTime, pauseCount,
    fcmed, fcmax,
    cad: cadAvg, cadMax,
    elevGain: Math.round(elevGain),
    splits, splitPaces,
    paceFastest, paceSlowest, paceOscillation, pacingTrend,
    avgPaceSec,
    date: validTimes[0] || new Date()
  };
}

function parseTCX(xml){
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const ns = 'http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2';
  const ns2 = 'http://www.garmin.com/xmlschemas/ActivityExtension/v2';
  const tps = [...doc.getElementsByTagNameNS(ns, 'Trackpoint')];
  if(!tps.length) return null;

  let distMax=0, fcSum=0, fcCnt=0, fcmax=0, elevGain=0, prevElev=null;
  let cadSum=0, cadCnt=0, cadMax=0, pauseCount=0;
  const times=[], lats=[], lons=[], hrs=[], splitPaces=[], splits=[];
  let lastKm=0, lastT=null, cumDist=0;

  tps.forEach(tp => {
    const t = tp.getElementsByTagNameNS(ns,'Time')[0]?.textContent;
    if(t) times.push(new Date(t));

    // Distance
    const d = parseFloat(tp.getElementsByTagNameNS(ns,'DistanceMeters')[0]?.textContent||0);
    if(d > distMax) distMax = d;

    // HR
    const hr = parseInt(tp.getElementsByTagNameNS(ns,'Value')[0]?.textContent||0);
    if(hr > 40 && hr < 230){ fcSum+=hr; fcCnt++; hrs.push(hr); if(hr>fcmax)fcmax=hr; }

    // Elevation
    const el = parseFloat(tp.getElementsByTagNameNS(ns,'AltitudeMeters')[0]?.textContent||'NaN');
    if(!isNaN(el)){ if(prevElev!==null && el-prevElev>0) elevGain+=el-prevElev; prevElev=el; }

    // Cadence
    const cadEl = tp.getElementsByTagNameNS(ns2,'RunCadence')[0] || tp.getElementsByTagNameNS(ns,'Cadence')[0];
    const cad = cadEl ? parseInt(cadEl.textContent)*2 : 0;
    if(cad > 100 && cad < 240){ cadSum+=cad; cadCnt++; if(cad>cadMax)cadMax=cad; }

    // Position
    const latEl = tp.getElementsByTagNameNS(ns,'LatitudeDegrees')[0];
    const lonEl = tp.getElementsByTagNameNS(ns,'LongitudeDegrees')[0];
    if(latEl && lonEl){ lats.push(parseFloat(latEl.textContent)); lons.push(parseFloat(lonEl.textContent)); }
  });

  // Splits from positions
  if(lats.length >= 2 && times.length >= 2){
    let lt = times[0];
    for(let i = 1; i < lats.length; i++){
      cumDist += haversine(lats[i-1],lons[i-1],lats[i],lons[i]);
      if(times[i]){
        const gap = (+times[i] - +times[i-1])/1000;
        if(gap > 30) pauseCount++;
      }
      if(cumDist >= lastKm+1 && times[i] && lt){
        const sec = (+times[i] - +lt)/1000;
        if(sec > 30){ splits.push(sp(Math.round(sec))); splitPaces.push(Math.round(sec)); }
        lt = times[i]; lastKm = Math.floor(cumDist);
      }
    }
  }

  const dist = distMax > 0 ? Math.round(distMax/10)/100 : Math.round(cumDist*100)/100;
  const durSec = times.length >= 2 ? (+times[times.length-1] - +times[0])/1000 : 0;
  const paceOscillation = splitPaces.length > 1 ? Math.max(...splitPaces) - Math.min(...splitPaces) : 0;
  let pacingTrend = 'constante';
  if(splitPaces.length >= 2){
    const half = Math.floor(splitPaces.length/2);
    const avgFirst = splitPaces.slice(0,half).reduce((a,b)=>a+b,0)/half;
    const avgLast = splitPaces.slice(half).reduce((a,b)=>a+b,0)/(splitPaces.length-half);
    const diff = avgLast - avgFirst;
    if(diff > 30) pacingTrend = 'negativo';
    else if(diff < -5) pacingTrend = 'progressivo';
  }

  return {
    dist, durSec, pauseCount,
    fcmed: fcCnt ? Math.round(fcSum/fcCnt) : 0, fcmax,
    cad: cadCnt ? Math.round(cadSum/cadCnt) : 0, cadMax,
    elevGain: Math.round(elevGain),
    splits, splitPaces,
    paceFastest: splitPaces.length ? sp(Math.min(...splitPaces)) : '',
    paceSlowest: splitPaces.length ? sp(Math.max(...splitPaces)) : '',
    paceOscillation, pacingTrend,
    avgPaceSec: dist > 0 && durSec > 0 ? Math.round(durSec/dist) : 0,
    date: times[0] || new Date()
  };
}

function parseJSON(txt){
  const d=JSON.parse(txt);
  return {dist:parseFloat(d.distance||d.dist||0),durSec:t2s(d.time||d.tempo||d.duration||''),
    fcmed:parseInt(d.avg_hr||d.fcmed||0),fcmax:parseInt(d.max_hr||d.fcmax||0),
    elevGain:parseInt(d.elevation||d.elev||0),splits:d.splits||[],date:new Date(d.date||d.data||Date.now())};
}

function parseCSV(txt){
  const lines=txt.trim().split('\n');if(lines.length<2)return null;
  const hdr=lines[0].split(',').map(h=>h.trim().toLowerCase());
  const row=lines[1].split(',').map(v=>v.trim());
  const get=k=>row[hdr.indexOf(k)]||'';
  return {dist:parseFloat(get('distance')||get('dist')||0),durSec:t2s(get('time')||get('duration')||get('tempo')||''),
    fcmed:parseInt(get('avg_hr')||get('fcmed')||0),fcmax:parseInt(get('max_hr')||get('fcmax')||0),
    elevGain:parseInt(get('elevation')||get('elev')||0),splits:[],date:new Date(get('date')||Date.now())};
}

function fillFormFromFile(r){
  const dateStr = r.date ? r.date.toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
  const setV = (id,v) => { const el=document.getElementById(id); if(el&&v!==undefined&&v!==null&&String(v)!=='') el.value=v; };

  // DATE
  setV('t-data', dateStr);

  // DISTANCE — use actual or estimate
  let finalDist = r.dist > 0 ? r.dist : 0;
  if(finalDist < 0.1 && r.durSec > 0 && r.splits && r.splits.length > 0){
    const avgSplitSec = r.splits.map(s=>t2s(s)).filter(v=>v>0).reduce((a,b)=>a+b,0) / r.splits.length;
    if(avgSplitSec > 0) finalDist = Math.round((r.durSec/avgSplitSec)*10)/10;
  }
  if(finalDist > 0) setV('t-dist', finalDist);

  // DURATION
  if(r.durSec > 0) setV('t-tempo', s2t(Math.round(r.durSec)));

  // PACE — calculate from dist+time (most accurate)
  if(finalDist > 0 && r.durSec > 0){
    setV('t-pace', sp(Math.round(r.durSec / finalDist)));
  } else if(r.avgPaceSec > 0){
    setV('t-pace', sp(r.avgPaceSec));
  } else if(r.splits && r.splits.length > 0){
    const avgSec = r.splits.map(s=>t2s(s)).filter(v=>v>0).reduce((a,b)=>a+b,0) / r.splits.length;
    if(avgSec > 0) setV('t-pace', sp(Math.round(avgSec)));
  }

  // HEART RATE
  if(r.fcmed > 0) setV('t-fcmed', r.fcmed);
  if(r.fcmax > 0) setV('t-fcmax', r.fcmax);

  // CADENCE
  if(r.cad > 0) setV('t-cad', r.cad);

  // ELEVATION
  if(r.elevGain > 0) setV('t-elev', r.elevGain);

  // SPLITS
  if(r.splits && r.splits.length > 0){
    const splitsEl = document.getElementById('t-splits');
    if(splitsEl) splitsEl.value = r.splits.join(', ');
  }

  // Store extra data for analysis
  window._lastFileData = r;
}

function renderCorridas(){
  const el=document.getElementById('pn-corridas');
  if(!el) return;
  const now=RACE_VIEW_DATE;
  const year=now.getFullYear();
  const month=now.getMonth();
  const monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dayNames=['D','S','T','Q','Q','S','S'];

  // Get races for this month
  const monthStr=String(month+1).padStart(2,'0')+'/'+year;
  const monthRaces=RACES.filter(r=>r.data&&r.data.slice(3,10)===monthStr);

  // Build calendar grid
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();

  // Race days set
  const raceDays=new Set(monthRaces.map(r=>parseInt(r.data.slice(0,2))));

  let calHtml='';
  // Day headers
  dayNames.forEach(d=>{ calHtml+=`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--tx3);padding:4px 0">${d}</div>`; });
  // Empty cells
  for(let i=0;i<firstDay;i++) calHtml+=`<div class="race-month-day other-month"></div>`;
  // Day cells
  for(let d=1;d<=daysInMonth;d++){
    const isToday=today.getDate()===d&&today.getMonth()===month&&today.getFullYear()===year;
    const hasRace=raceDays.has(d);
    const isPast=new Date(year,month,d)<today&&!isToday;
    calHtml+=`<div class="race-month-day${isToday?' today':''}${hasRace&&!isToday?' has-race':''}${isPast?' other-month':''}" 
      onclick="scrollToRaceDay(${d})" style="${isPast?'opacity:.5':''}">
      ${d}
      ${hasRace&&!isToday?'<div class="race-badge"></div>':''}
    </div>`;
  }

  // Upcoming races globally (next 90 days)
  const todayMs=Date.now();
  const upcoming=RACES.filter(r=>{
    if(!r.data) return false;
    const [dd,mm,yyyy]=r.data.split('/');
    const rDate=new Date(yyyy,mm-1,dd);
    return rDate>=today&&(rDate-today)<=90*86400000;
  }).sort((a,b)=>{
    const parse=s=>{const [dd,mm,yyyy]=s.split('/');return new Date(yyyy,mm-1,dd);};
    return parse(a.data)-parse(b.data);
  });

  // Dist badge color
  const distColor=d=>{
    if(!d) return '#999';
    if(d.includes('42')||d.toLowerCase().includes('marat')) return '#E8365D';
    if(d.includes('21')||d.toLowerCase().includes('meia')) return '#6C5CE7';
    if(d.includes('15')) return '#0984E3';
    if(d.includes('10')) return '#FF5C00';
    return '#00B894';
  };

  const raceListHtml = monthRaces.length===0
    ? `<div class="empty"><div class="empty-icon">🏅</div><div class="empty-title">Nenhuma corrida em ${monthNames[month]}</div><div class="empty-sub">Adicione suas provas inscritas para organizar sua agenda.</div></div>`
    : monthRaces.map(r=>`<div class="race-list-item" id="race-${r.data?.replace(/\//g,'-')}">
        <div>
          <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--neon);line-height:1">${r.data?.slice(0,2)||'—'}</div>
          <div style="font-size:10px;color:var(--tx3);text-align:center">${monthNames[month].slice(0,3).toUpperCase()}</div>
        </div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:3px">${r.nome}</div>
          ${r.local?`<div style="font-size:12px;color:var(--tx2);margin-bottom:4px">📍 ${r.local}</div>`:''}
          <div style="display:flex;gap:6px;flex-wrap:wrap">

          <button onclick="changeRaceMonth(-1)" style="background:var(--bg3);border:1.5px solid var(--bd);border-radius:10px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--tx2)">‹</button>

              const today = new Date();
              const sorted = [...RACES].sort((a,b)=>{
                const parse=s=>{const[dd,mm,yyyy]=s.split('/');return new Date(yyyy,mm-1,dd);};
                return parse(a.data)-parse(b.data);
              });
              return sorted.map(r=>{
                const [dd,mm,yyyy]=r.data.split('/');
                const rDate=new Date(yyyy,mm-1,dd);
                const diff=Math.ceil((rDate-today)/86400000);
                const isPast=diff<0;
                const dColor=isPast?'var(--tx3)':'var(--neon)';

function changeRaceMonth(dir){
  RACE_VIEW_DATE=new Date(RACE_VIEW_DATE.getFullYear(), RACE_VIEW_DATE.getMonth()+dir, 1);
  renderCorridas();
}

function scrollToRaceDay(day){
  const padDay=String(day).padStart(2,'0');
  const el=document.getElementById('race-'+padDay+'-'+
    String(RACE_VIEW_DATE.getMonth()+1).padStart(2,'0')+'-'+
    RACE_VIEW_DATE.getFullYear());
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function openAddRaceModal(){
  const today=new Date().toISOString().split('T')[0];
  const modal=document.createElement('div');
  modal.className='race-form-modal';
  modal.innerHTML=`<div class="race-form-inner">
    <div style="width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 16px"></div>
    <div style="font-size:18px;font-weight:800;color:var(--tx);margin-bottom:16px">🏅 Adicionar prova</div>
    <div class="field" style="margin-bottom:10px"><label>Nome da corrida *</label><input type="text" id="rc-nome" placeholder="ex: São Silvestre 10km"></div>
    <div class="g2" style="margin-bottom:10px">
      <div class="field"><label>Data *</label><input type="date" id="rc-data" value="${today}"></div>
      <div class="field"><label>Distância</label>
        <select id="rc-dist">
          <option value="">Selecione</option>
          <option value="5km">5km</option><option value="10km">10km</option>
          <option value="15km">15km</option><option value="21km (Meia)">21km (Meia)</option>
          <option value="42km (Maratona)">42km (Maratona)</option>
          <option value="Trail">Trail</option><option value="Outra">Outra</option>
        </select>
      </div>
    </div>
    <div class="field" style="margin-bottom:10px"><label>Local / Cidade</label><input type="text" id="rc-local" placeholder="ex: São Paulo, SP"></div>
    <div class="field" style="margin-bottom:16px"><label>Observações</label><input type="text" id="rc-obs" placeholder="ex: Objetivo: 55 min"></div>
    <div id="rc-conflict" style="display:none;margin-bottom:10px;padding:10px 14px;background:rgba(232,54,93,.08);border-radius:var(--r);border-left:3px solid var(--red);font-size:12px;color:var(--red)"></div>
    <div id="rc-msg" style="display:none;margin-bottom:10px;padding:10px;border-radius:var(--r);font-size:12px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-neon" style="flex:1" onclick="doAddRace()">💾 Salvar prova</button>
      <button class="btn btn-ghost" style="width:auto;padding:12px 16px" onclick="this.closest('.race-form-modal').remove()">✕</button>
    </div>
  </div>`;

  // Check conflicts on date change
  modal.querySelector('#rc-data').addEventListener('change', function(){
    const v=this.value;
    if(!v) return;
    const [y,m,d]=v.split('-');
    const dataStr=d+'/'+m+'/'+y;
    const conflicts=RACES.filter(r=>r.data===dataStr);
    const conflEl=modal.querySelector('#rc-conflict');
    if(conflicts.length>0){
      conflEl.style.display='block';
      conflEl.textContent='⚠️ Conflito! Já tem prova nesta data: '+conflicts.map(r=>r.nome).join(', ');
    } else {
      conflEl.style.display='none';
    }
  });

  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  document.body.appendChild(modal);
}

async function doAddRace(){
  const nomeEl=document.getElementById('rc-nome');
  const dataEl=document.getElementById('rc-data');
  const distEl=document.getElementById('rc-dist');
  const localEl=document.getElementById('rc-local');
  const obsEl=document.getElementById('rc-obs');
  const msgEl=document.getElementById('rc-msg');

  const nome=nomeEl?.value?.trim();
  const dataISO=dataEl?.value;
  if(!nome||!dataISO){
    if(msgEl){msgEl.style.display='block';msgEl.style.background='var(--red-dim)';msgEl.style.color='var(--red)';msgEl.textContent='Preencha nome e data.';}
    return;
  }
  const [y,m,d]=dataISO.split('-');
  const data=d+'/'+m+'/'+y;

  if(msgEl){msgEl.style.display='block';msgEl.style.background='var(--teal-dim)';msgEl.style.color='var(--teal)';msgEl.textContent='Salvando...';}
  const ok=await saveRace({nome,data,distancia:distEl?.value||'',local:localEl?.value?.trim()||'',obs:obsEl?.value?.trim()||''});
  if(ok){
    document.querySelector('.race-form-modal')?.remove();
    // Jump to that month
    RACE_VIEW_DATE=new Date(y,m-1,1);
    renderCorridas();
  } else {
    if(msgEl){msgEl.textContent='Erro ao salvar. Tente novamente.';}
  }
}

async function doDeleteRace(id){
  if(!confirm('Remover esta prova?')) return;
  await deleteRace(id);
  renderCorridas();
}

async function doDelete(id){
  if(!confirm('Excluir este treino e toda a análise associada?'))return;
  await deleteWorkout(id);
  renderEvolucao();
}

function parseNextWorkoutText(text, dayKey){
  // Parse free-form next workout text into structured plan object
  if(!text) return {tipo:'OFF',zona:'OFF',descricao:'Descanso',pace:''};

  // Detect workout type from keywords
  let tipo = 'TREINO', zona = 'Z1';
  if(/intervalad|interval/i.test(text))  { tipo='INTERVALADO'; zona='Z3'; }
  else if(/tempo|limiar/i.test(text))    { tipo='TEMPO RUN';   zona='Z2'; }
  else if(/long[aã]o|longa/i.test(text)) { tipo='LONGÃO';      zona='LONGAO'; }
  else if(/strides|subida/i.test(text))  { tipo='STRIDES';     zona='Z3'; }
  else if(/base|aeróbic/i.test(text))    { tipo='BASE';        zona='Z1'; }

  // Extract pace if present
  const paceMatch = text.match(/(\d+:\d+)(?:\s*[-–]\s*(\d+:\d+))?\/km/);
  const pace = paceMatch ? (paceMatch[2] ? paceMatch[1]+'–'+paceMatch[2] : paceMatch[1]) : '';

  // Extract duration
  const durMatch = text.match(/~?(\d+)[-–]?(\d+)?\s*min/i);
  const tempoEst = durMatch ? parseInt(durMatch[1]) : (USER_GOAL?.tempo_treino||45);

  // Clean description — first 200 chars of the text, removing markdown
  const descricao = text
    .replace(/#{1,3}\s*/g,'')
    .replace(/\*\*/g,'')
    .replace(/^[›>]\s*/gm,'')
    .replace(/\n{2,}/g,' · ')
    .replace(/\n/g,' ')
    .trim()
    .substring(0,250);

  return {
    tipo, zona, pace, tempo_estimado: tempoEst,
    descricao,
    _fromAnalysis: true  // flag: this was AI-adjusted
  };
}

}
