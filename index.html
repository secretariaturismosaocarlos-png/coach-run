<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Run — Treinador de Corrida</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   TOKENS — CORRIDA DE RUA PALETTE
══════════════════════════════════════════════ */
:root{
  /* Brand */
  --neon:#E8FF00;        /* neon yellow — número de peito */
  --neon-dim:rgba(232,255,0,0.12);
  --orange:#FF5C00;      /* laranja vivo — cones */
  --orange-dim:rgba(255,92,0,0.12);
  --teal:#00E5CC;        /* teal elétrico — chip de cronometragem */
  --teal-dim:rgba(0,229,204,0.10);
  --red:#FF3D5A;         /* vermelho — zona forte */
  --red-dim:rgba(255,61,90,0.10);
  --purple:#B44FFF;      /* roxo — recovery */
  --purple-dim:rgba(180,79,255,0.10);
  /* Backgrounds */
  --bg:#0A0B0D;
  --bg2:#111318;
  --bg3:#181C22;
  --bg4:#1E2330;
  /* Text */
  --tx:#F0F2F5;
  --tx2:#7A8494;
  --tx3:#3A4152;
  /* Border */
  --bd:rgba(255,255,255,0.07);
  --bd2:rgba(255,255,255,0.13);
  /* Radius */
  --r:10px; --rl:16px; --rx:24px;
  /* Font */
  --sans:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--tx3);border-radius:4px}

/* ══ APP SHELL ══ */
.app{max-width:720px;margin:0 auto;padding:0 0 100px}

/* ══ HEADER ══ */
.header{padding:20px 16px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--neon);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rx);padding:6px 12px;cursor:pointer}
.user-avatar{width:26px;height:26px;border-radius:50%;background:var(--neon);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000}
.user-name{font-size:12px;font-weight:500}

/* ══ BOTTOM NAV ══ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,11,13,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding:8px 0 12px;z-index:100}
.nav-inner{max-width:720px;margin:0 auto;display:flex;justify-content:space-around;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-inner::-webkit-scrollbar{display:none}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;border:none;background:transparent;cursor:pointer;border-radius:var(--r);transition:all .2s;min-width:60px}
.nav-btn .ni{font-size:20px;transition:transform .2s}
.nav-btn .nl{font-size:10px;font-weight:600;color:var(--tx2);transition:color .2s;letter-spacing:.3px;text-transform:uppercase}
.nav-btn.active .nl{color:var(--neon)}
.nav-btn.active .ni{transform:scale(1.15)}
.panel{display:none;padding:0 16px}.panel.active{display:block}

/* ══ CARDS ══ */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:12px}
.card-accent{border-color:rgba(232,255,0,.2);background:linear-gradient(135deg,var(--bg2) 0%,rgba(232,255,0,.03) 100%)}
.card-orange{border-color:rgba(255,92,0,.2);background:linear-gradient(135deg,var(--bg2) 0%,rgba(255,92,0,.03) 100%)}
.card-teal{border-color:rgba(0,229,204,.2);background:linear-gradient(135deg,var(--bg2) 0%,rgba(0,229,204,.03) 100%)}
.clabel{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);margin-bottom:12px}

/* ══ FORMS ══ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.field label{font-size:11px;font-weight:600;color:var(--tx2);display:block;margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:var(--sans);font-size:14px;outline:none;transition:all .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(232,255,0,.4);background:var(--bg4);box-shadow:0 0 0 3px rgba(232,255,0,.06)}
.field input::placeholder,.field textarea::placeholder{color:var(--tx3)}
.field input.ok{border-color:rgba(0,229,204,.4);background:rgba(0,229,204,.04)}
select option{background:var(--bg3)}

/* ══ BUTTONS ══ */
.btn{padding:12px 20px;border:none;border-radius:var(--r);font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.2px}
.btn-neon{background:var(--neon);color:#000;width:100%}
.btn-neon:hover{background:#f5ff33;transform:translateY(-1px)}
.btn-orange{background:var(--orange);color:#fff;width:100%}
.btn-orange:hover{background:#ff7322}
.btn-ghost{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd);width:100%}
.btn-ghost:hover{border-color:var(--bd2);color:var(--tx)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,61,90,.2)}
.btn-danger:hover{background:rgba(255,61,90,.2)}

/* ══ PILLS / BADGES ══ */
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-neon{background:var(--neon-dim);color:var(--neon)}
.badge-orange{background:var(--orange-dim);color:var(--orange)}
.badge-teal{background:var(--teal-dim);color:var(--teal)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-purple{background:var(--purple-dim);color:var(--purple)}
.badge-gray{background:rgba(255,255,255,.06);color:var(--tx2)}

/* ══ ALERTS ══ */
.alert{display:flex;gap:10px;padding:10px 14px;border-radius:var(--r);margin-bottom:8px;font-size:12px;line-height:1.6;border-left:3px solid}
.alert-neon{background:var(--neon-dim);border-color:var(--neon);color:#d4e800}
.alert-orange{background:var(--orange-dim);border-color:var(--orange);color:#ff8c44}
.alert-red{background:var(--red-dim);border-color:var(--red);color:#ff7a8a}
.alert-teal{background:var(--teal-dim);border-color:var(--teal);color:#4dfde8}

/* ══ METRICS ══ */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.metric{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 10px;text-align:center;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.metric-neon::before{background:var(--neon)}
.metric-orange::before{background:var(--orange)}
.metric-teal::before{background:var(--teal)}
.mlabel{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.mval{font-family:var(--mono);font-size:20px;font-weight:700}
.msub{font-size:10px;color:var(--tx2);margin-top:2px}

/* ══ SCORE RING ══ */
.score-wrap{display:flex;align-items:center;gap:16px}
.score-ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.score-ring-wrap svg{transform:rotate(-90deg)}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1}
.score-lbl{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-top:1px}

/* ══ ZONE BARS ══ */
.zone-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-radius:var(--r);margin-bottom:5px;border:1px solid transparent}
.zone-label{font-size:12px;font-weight:600}
.zone-sub{font-size:10px;margin-top:1px;opacity:.7}
.zone-pace{font-family:var(--mono);font-size:12px;font-weight:700}

/* ══ PROGRESS BAR ══ */
.prog-wrap{margin:10px 0}
.prog-header{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
.prog-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .9s cubic-bezier(.4,0,.2,1)}

/* ══ STEPS (WORKOUT) ══ */
.step-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)}
.step-row:last-child{border-bottom:none}
.step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px}
.sdL{background:var(--neon-dim);color:var(--neon);border:1px solid rgba(232,255,0,.2)}
.sdM{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,92,0,.2)}
.sdF{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,61,90,.2)}
.step-title{font-size:13px;font-weight:600;margin-bottom:2px}
.step-desc{font-size:11px;color:var(--tx2);line-height:1.5}
.step-pace{font-family:var(--mono);font-size:11px;color:var(--neon);margin-top:2px}

/* ══ PLAN CARD ══ */
.plan-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:8px;position:relative;overflow:hidden}
.plan-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.plan-easy::before{background:var(--neon)}
.plan-mod::before{background:var(--orange)}
.plan-hard::before{background:var(--red)}
.plan-long::before{background:var(--teal)}
.plan-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.plan-day{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.plan-title{font-size:14px;font-weight:700}
.plan-obj{font-size:11px;color:var(--tx2);margin-bottom:8px;line-height:1.5}
.plan-body{font-size:12px;background:var(--bg4);padding:8px 10px;border-radius:var(--r);line-height:1.7;color:var(--tx)}

/* ══ EVOLUTION CHART BARS ══ */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-date{font-size:10px;color:var(--tx3);width:44px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.bar-bg{flex:1;background:var(--bg3);border-radius:3px;height:22px;overflow:hidden;border:1px solid var(--bd)}
.bar-fill{height:100%;border-radius:2px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;font-family:var(--mono);transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ══ HISTORY TABLE ══ */
.htable{width:100%;font-size:12px;border-collapse:collapse}
.htable th{text-align:left;padding:6px 8px;color:var(--tx3);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--bd)}
.htable td{padding:8px 8px;border-bottom:1px solid var(--bd);vertical-align:middle}
.htable tr:last-child td{border-bottom:none}
.htable tr:hover td{background:rgba(255,255,255,.02)}
.del-btn{background:none;border:1px solid var(--bd);cursor:pointer;color:var(--tx3);font-size:12px;padding:3px 8px;border-radius:6px;transition:all .15s;font-family:var(--sans)}
.del-btn:hover{color:var(--red);background:var(--red-dim);border-color:rgba(255,61,90,.3)}
.tr-up{color:var(--neon);font-weight:700}.tr-dn{color:var(--red);font-weight:700}.tr-ne{color:var(--orange);font-weight:700}

/* ══ EVO STATS ══ */
.evo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.evo-stat{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:12px;text-align:center;position:relative;overflow:hidden}
.evo-stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.esl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.esv{font-family:var(--mono);font-size:18px;font-weight:700}
.esd{font-size:10px;margin-top:2px;color:var(--tx2)}

/* ══ GOAL BOX ══ */
.goal-box{border-radius:var(--rl);padding:16px;margin-bottom:12px;border:1px solid}
.gb-neon{background:var(--neon-dim);border-color:rgba(232,255,0,.2)}
.gb-orange{background:var(--orange-dim);border-color:rgba(255,92,0,.2)}
.gb-teal{background:var(--teal-dim);border-color:rgba(0,229,204,.2)}
.grow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:13px}
.grow:last-child{border-bottom:none}
.gkey{color:var(--tx2);font-size:12px}
.gval{font-family:var(--mono);font-weight:700}

/* ══ UPLOAD ══ */
.upload-zone{border:2px dashed rgba(232,255,0,.2);border-radius:var(--rl);padding:24px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--neon-dim);position:relative;margin-bottom:12px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--neon);background:rgba(232,255,0,.18)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.utype{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;background:var(--bg3);color:var(--tx2);border:1px solid var(--bd);margin:2px}

/* ══ OBJ GRID ══ */
.obj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.obj-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .2s;position:relative}
.obj-card:hover{border-color:rgba(232,255,0,.3);transform:translateY(-1px)}
.obj-card.sel{border-color:var(--neon);background:var(--neon-dim);box-shadow:0 0 20px rgba(232,255,0,.08)}
.obj-card.sel::after{content:'✓';position:absolute;top:8px;right:10px;font-size:12px;color:var(--neon);font-weight:700}
.oi{font-size:18px;margin-bottom:5px}
.ot{font-size:12px;font-weight:700;margin-bottom:2px;line-height:1.3}
.os{font-size:10px;color:var(--tx2)}

/* ══ DIVIDER ══ */
.divider{height:1px;background:var(--bd);margin:12px 0}
.or-div{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--tx3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ══ EMPTY ══ */
.empty{text-align:center;padding:50px 24px;color:var(--tx3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--tx2)}
.empty-sub{font-size:12px;line-height:1.6}

/* ══ AUTH SCREENS ══ */
#screen-auth{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-icon{width:64px;height:64px;background:var(--neon);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px}
.auth-title{font-size:28px;font-weight:700;letter-spacing:-.5px}
.auth-sub{font-size:14px;color:var(--tx2);margin-top:4px}
.auth-form{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rx);padding:24px}
.auth-tab-wrap{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:20px;gap:3px}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--tx2);font-family:var(--sans);font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--bg2);color:var(--tx)}
.auth-msg{margin-top:12px;padding:10px 14px;border-radius:var(--r);font-size:12px;line-height:1.5;display:none}

/* ══ PENDING SCREEN ══ */
#screen-pending{position:fixed;inset:0;background:var(--bg);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;text-align:center}
.pending-box{max-width:360px}

/* ══ ADMIN PANEL ══ */
.admin-user-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd);gap:10px}
.admin-user-row:last-child{border-bottom:none}
.admin-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;border:1px solid var(--bd)}
.admin-info{flex:1;min-width:0}
.admin-email{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-meta{font-size:11px;color:var(--tx2);margin-top:1px}
.admin-actions{display:flex;gap:6px;flex-shrink:0}
.admin-btn{padding:5px 12px;border:1px solid var(--bd);border-radius:var(--r);background:transparent;color:var(--tx2);font-family:var(--sans);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.admin-btn.approve{border-color:rgba(232,255,0,.3);color:var(--neon)}
.admin-btn.approve:hover{background:var(--neon-dim)}
.admin-btn.block{border-color:rgba(255,61,90,.3);color:var(--red)}
.admin-btn.block:hover{background:var(--red-dim)}
.admin-btn.unblock{border-color:rgba(0,229,204,.3);color:var(--teal)}
.admin-btn.unblock:hover{background:var(--teal-dim)}

/* ══ ONBOARDING ══ */
.ob-step{display:none}.ob-step.active{display:block}
.ob-progress{display:flex;gap:6px;margin-bottom:20px}
.ob-pip{height:4px;flex:1;border-radius:2px;background:var(--bg3);transition:background .3s}
.ob-pip.done{background:var(--neon)}
.ob-heading{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.ob-sub{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:18px}

/* ══ SYNC DOT ══ */
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.sdg{background:var(--neon)}.sda{background:var(--orange)}.sdx{background:var(--tx3)}.sdb{background:var(--teal);animation:sdp 1s linear infinite}
@keyframes sdp{0%,100%{opacity:1}50%{opacity:.2}}

/* ══ RESPONSIVE ══ */
@media(max-width:480px){
  .g3{grid-template-columns:1fr 1fr}
  .metrics{grid-template-columns:1fr 1fr}
  .obj-grid{grid-template-columns:1fr}
  .evo-grid{grid-template-columns:1fr 1fr}
  .admin-actions{flex-direction:column}
}

/* ══ PLAN SPREADSHEET ══ */
.plan-sheet{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.plan-sheet th{padding:7px 5px;text-align:center;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border:1px solid var(--bd);background:var(--bg3);color:var(--tx2)}
.plan-sheet td{padding:6px 5px;vertical-align:top;border:1px solid var(--bd);min-height:60px;font-size:10px;line-height:1.5;cursor:pointer;transition:background .15s}
.plan-sheet td:hover{background:rgba(255,255,255,.03)}
.plan-sheet .ps-week{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;writing-mode:vertical-lr;transform:rotate(180deg);padding:8px 4px;text-align:center;background:var(--bg3);border:1px solid var(--bd);white-space:nowrap}
.ps-off{background:rgba(255,255,255,.02);color:var(--tx3);text-align:center;font-weight:700;padding:20px 4px}
.ps-z1{border-top:3px solid var(--neon) !important;background:rgba(232,255,0,.03)}
.ps-z2{border-top:3px solid var(--orange) !important;background:rgba(255,92,0,.03)}
.ps-z3{border-top:3px solid var(--red) !important;background:rgba(255,61,90,.03)}

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
function authSwitchTab(t){
  document.getElementById('auth-login').style.display    = t==='login'    ? 'block' : 'none';
  document.getElementById('auth-register').style.display = t==='register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((el,i)=>el.classList.toggle('active',[`login`,'register'][i]===t));
  hideAuthMsg();
}

function showAuthMsg(msg, type='error'){
  const el=document.getElementById('auth-msg');
  el.style.display='block';
  el.style.background = type==='ok' ? 'rgba(0,229,204,.1)' : 'rgba(255,61,90,.1)';
  el.style.color       = type==='ok' ? 'var(--teal)' : 'var(--red)';
  el.style.border      = `1px solid ${type==='ok' ? 'rgba(0,229,204,.3)' : 'rgba(255,61,90,.3)'}`;
  el.textContent = msg;
}
function hideAuthMsg(){ document.getElementById('auth-msg').style.display='none'; }

function togglePass(id,btn){const el=document.getElementById(id);if(el.type==='password'){el.type='text';btn.textContent='🙈';}else{el.type='password';btn.textContent='👁';}}

async function doForgotPass(){
  const email=document.getElementById('l-email').value.trim();
  if(!email){showAuthMsg('Digite seu e-mail acima primeiro.');return;}
  showAuthMsg('Enviando link...','ok');
  const {error}=await db.auth.resetPasswordForEmail(email,{redirectTo:'https://secretariaturismosaocarlos-png.github.io/coach-run/'});
  if(error)showAuthMsg('Erro: '+error.message);
  else showAuthMsg('✓ Link enviado para '+email+'. Verifique sua caixa de entrada.','ok');
}

async function doLogin(){
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  if(!email||!pass){ showAuthMsg('Preencha e-mail e senha.'); return; }
  showAuthMsg('Entrando...','ok');
  const {data, error} = await db.auth.signInWithPassword({email, password:pass});
  if(error){
    if(error.message==='Invalid login credentials') showAuthMsg('E-mail ou senha incorretos.');
    else if(error.message.includes('Email not confirmed')) showAuthMsg('E-mail não confirmado. Use o link mágico enviado ao seu e-mail, ou contate a administradora.');
    else showAuthMsg(error.message);
    return;
  }
  if(data?.user){
    CU = data.user;
    await loadUserProfile();
  }
}

async function doRegister(){
  const name  = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value;
  if(!name||!email||!pass){ showAuthMsg('Preencha todos os campos.'); return; }
  if(pass.length<6){ showAuthMsg('Senha deve ter no mínimo 6 caracteres.'); return; }
  showAuthMsg('Criando conta...','ok');
  const {data, error} = await db.auth.signUp({email, password:pass, options:{data:{name}}});
  if(error){ showAuthMsg(error.message); return; }
  if(data?.user){
    try {
      await db.from('profiles').insert({id:data.user.id, email, name, status:'pending', is_admin:false});
    } catch(e) { /* profile may already exist */ }
  }
  showAuthMsg('✓ Conta criada! Aguarde a aprovação da administradora para acessar.','ok');
}

function doLogout(){
  if(!confirm('Sair da conta?')) return;
  db.auth.signOut();
}

// Auth state listener
db.auth.onAuthStateChange(async (event, session)=>{
  if(event === 'SIGNED_OUT'){
    CU = null; PROFILE = null;
    showScreen('auth');
  }
  // INITIAL_SESSION handles page reload with existing session
  if(event === 'INITIAL_SESSION' && session?.user){
    CU = session.user;
    await loadUserProfile();
  }
});

async function loadUserProfile(){
  try {
    const {data} = await db.from('profiles').select('*').eq('id', CU.id).single();
    // Admin always gets through
    if(CU.email === ADMIN_EMAIL){
      PROFILE = data || {id:CU.id,email:CU.email,name:'Admin',status:'approved',is_admin:true};
      IS_ADMIN = true;
      showScreen('app'); await loadData(); setupUI(); renderHome(); return;
    }
    PROFILE = data; IS_ADMIN = data?.is_admin||false;
    if(!PROFILE||PROFILE.status==='pending'){showScreen('pending');return;}
    if(PROFILE.status==='blocked'){showScreen('pending');return;}
    showScreen('app'); await loadData(); setupUI(); renderHome();
  } catch(e) {
    if(CU.email===ADMIN_EMAIL){
      PROFILE={id:CU.id,email:CU.email,name:'Admin',status:'approved',is_admin:true};
      IS_ADMIN=true; showScreen('app'); await loadData(); setupUI(); renderHome();
    } else { showScreen('pending'); }
  }
}

function showScreen(s){
  document.getElementById('screen-auth').style.display    = s==='auth'    ? 'flex'  : 'none';
  document.getElementById('screen-pending').style.display = s==='pending' ? 'flex'  : 'none';
  document.getElementById('screen-app').style.display     = s==='app'     ? 'block' : 'none';
}

function setupUI(){
  const name=PROFILE?.name||CU.email.split('@')[0];
  document.getElementById('user-name-display').textContent=name.split(' ')[0];
  document.getElementById('user-avatar').textContent=name[0].toUpperCase();
  if(IS_ADMIN){document.getElementById('nb-admin').style.display='flex';checkPendingUsers();}
}
async function checkPendingUsers(){
  try{
    const {data}=await db.from('profiles').select('id').eq('status','pending');
    const n=data?data.length:0;
    const b=document.getElementById('admin-badge');
    if(b){
      b.style.display=n>0?'block':'none';
      b.textContent=n;
      if(n>(window._lastPending||0))playNotif();
      window._lastPending=n;
    }
    setTimeout(checkPendingUsers,30000);
  }catch(e){}
}
function playNotif(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [880,1100].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+i*.15);
      g.gain.linearRampToValueAtTime(.3,ctx.currentTime+i*.15+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.15+.25);
      o.start(ctx.currentTime+i*.15);o.stop(ctx.currentTime+i*.15+.25);
    });
  }catch(e){}
}

async function loadData(){
  const {data:workouts} = await db.from('workouts').select('*').eq('user_id', CU.id).order('created_at');
  HIST = (workouts||[]).map(w=>({...w, paceSec:ps(w.pace)}));
  const {data:prof} = await db.from('user_goals').select('*').eq('user_id', CU.id).single();
  if(prof) USER_GOAL = prof;
}

let USER_GOAL = null; // {obj_id, nivel, dias_semana, target_pace_sec, target_date, onboard_done}

async function saveGoal(g){
  USER_GOAL = g;
  await db.from('user_goals').upsert({user_id:CU.id, ...g, updated_at:new Date()});
}

async function saveWorkout(t){
  const {data} = await db.from('workouts').insert({
    user_id:CU.id, data:t.data, dist:t.dist, tempo:t.tempo,
    pace:t.pace, fcmed:t.fcmed||null, fcmax:t.fcmax||null,
    cad:t.cad||null, splits:t.splits||null
  }).select().single();
  if(data){ t.id=data.id; t.created_at=data.created_at; HIST.push({...t, paceSec:ps(t.pace)}); }
}

async function deleteWorkout(id){
  await db.from('workouts').delete().eq('id',id).eq('user_id',CU.id);
  HIST = HIST.filter(t=>t.id!==id);
}

// ═══════════════════════════════════════════════════
//  ADMIN FUNCTIONS
// ═══════════════════════════════════════════════════
async function loadAdminPanel(){
  const {data:users} = await db.from('profiles').select('*').order('created_at');
  const el = document.getElementById('pn-admin');
  if(!users||!users.length){el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">Nenhum usuário</div></div>';return;}

  const pending   = users.filter(u=>u.status==='pending');
  const approved  = users.filter(u=>u.status==='approved'&&!u.is_admin);
  const blocked   = users.filter(u=>u.status==='blocked');

  let html = `<div style="padding-top:8px;margin-bottom:4px">
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">⚙️ Painel Admin</div>
    <div style="font-size:12px;color:var(--tx2)">Gerencie os acessos dos usuários</div>
  </div>`;

  if(pending.length){
    html+=`<div class="card card-orange" style="margin-top:12px">
      <div class="clabel">⏳ Aguardando aprovação (${pending.length})</div>`;
    pending.forEach(u=>{ html+=adminUserRow(u); });
    html+='</div>';
  }
  if(approved.length){
    html+=`<div class="card" style="margin-top:4px">
      <div class="clabel">✅ Aprovados (${approved.length})</div>`;
    approved.forEach(u=>{ html+=adminUserRow(u); });
    html+='</div>';
  }
  if(blocked.length){
    html+=`<div class="card" style="margin-top:4px">
      <div class="clabel">🚫 Bloqueados (${blocked.length})</div>`;
    blocked.forEach(u=>{ html+=adminUserRow(u); });
    html+='</div>';
  }
  el.innerHTML=html;
}

function adminUserRow(u){
  const date = u.created_at ? new Date(u.created_at).toLocaleDateString('pt-BR') : '—';
  let actions='';
  if(u.status==='pending')  actions=`<button class="admin-btn approve" onclick="setUserStatus('${u.id}','approved')">✓ Aprovar</button>`;
  if(u.status==='approved') actions=`<button class="admin-btn block"   onclick="setUserStatus('${u.id}','blocked')">✕ Bloquear</button>`;
  if(u.status==='blocked')  actions=`<button class="admin-btn unblock" onclick="setUserStatus('${u.id}','approved')">↺ Reativar</button>`;
  return `<div class="admin-user-row">
    <div class="admin-avatar">${(u.name||u.email||'?')[0].toUpperCase()}</div>
    <div class="admin-info">
      <div class="admin-email">${u.name||'—'}</div>
      <div class="admin-meta">${u.email} · ${date}</div>
    </div>
    <div class="admin-actions">${actions}</div>
  </div>`;
}

async function setUserStatus(uid, status){
  await db.from('profiles').update({status}).eq('id',uid);
  loadAdminPanel();
}

function goTab(n){
  ['home','treino','analise','plano','evolucao','admin'].forEach(t=>{
    document.getElementById('pn-'+t).classList.toggle('active',t===n);
    const nb=document.getElementById('nb-'+t);
    if(nb) nb.classList.toggle('active',t===n);
  });
  if(n==='home')     renderHome();
  if(n==='treino')   renderTreino();
  if(n==='analise')  renderAnalise();
  if(n==='plano')    renderPlano();
  if(n==='evolucao') renderEvolucao();
  if(n==='admin')    loadAdminPanel();
}

function renderHome(){

  </div>`;

  // Goal card
  html+=`<div class="card card-accent">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div>
        <div style="font-size:11px;color:var(--tx3);font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px">Objetivo</div>
        <div style="font-size:15px;font-weight:700">${obj.icon} ${obj.t}</div>

function previewZones(testTime, fcmax){
  const z = calcZonesFromTest(testTime, fcmax);
  if(!z) return '<div style="font-size:12px;color:var(--tx2)">Tempo inválido.</div>';
  return Object.values(z).map(zv=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;border-radius:6px;margin-bottom:3px;background:${zv.bg}">
      <span style="font-size:12px;font-weight:600;color:${zv.color}">${zv.emoji} ${zv.label}</span>
      <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${zv.color}">${sp(zv.min)}–${sp(zv.max)}</span>
    </div>`
  ).join('');
}

function calcZonesFromTest(testTime, fcmax){
  const secs = t2s(testTime);
  if(!secs || secs < 600 || secs > 2400) return null;

  const vam_ms = 3000 / secs;
  const vam_kmh = Math.round(vam_ms * 3.6 * 10)/10;
  const vam_pace = Math.round(1000 / vam_ms);

  // Anchor zones to athlete's ACTUAL workout pace — never show zones
  // slower than what the athlete already does
  let refPace = vam_pace;
  if(typeof HIST !== 'undefined' && HIST && HIST.length > 0){
    const recent = HIST.slice(-5).filter(w => w.paceSec > 60 && w.paceSec < 900);
    if(recent.length > 0){
      const avg = Math.round(recent.reduce((a,w)=>a+w.paceSec,0)/recent.length);
      refPace = Math.min(vam_pace, avg);
    }
  }

  return {
    e: { min:Math.round(refPace*1.10), max:Math.round(refPace*1.25),
         label:'Z1 — Base aeróbica', emoji:'🟢',
         desc:'Conversa normal. 70–80% dos treinos.',
         color:'var(--neon)', bg:'var(--neon-dim)' },
    m: { min:Math.round(refPace*1.03), max:Math.round(refPace*1.09),
         label:'Z1+ — Leve/Moderado', emoji:'🔵',
         desc:'Fala frases curtas. Longões.',
         color:'#4da6ff', bg:'rgba(77,166,255,.08)' },
    t: { min:Math.round(refPace*0.95), max:Math.round(refPace*1.02),
         label:'Z2 — Limiar', emoji:'🟡',
         desc:'Difícil mas sustentável 20+ min.',
         color:'var(--orange)', bg:'var(--orange-dim)' },
    i: { min:Math.round(refPace*0.87), max:Math.round(refPace*0.94),
         label:'Z3 — Intervalo VO2max', emoji:'🔴',
         desc:'Muito difícil. Máx 10–15 min acumulados.',
         color:'var(--red)', bg:'var(--red-dim)' },
    r: { min:Math.round(refPace*0.80), max:Math.round(refPace*0.86),
         label:'Z3+ — Sprint', emoji:'💀',
         desc:'Sprint curto. Máx 400m ou 2 min por rep.',
         color:'var(--purple)', bg:'var(--purple-dim)' },
    _vam: { ms:vam_ms, kmh:vam_kmh, pace:vam_pace }
  };
}

function buildHumanAnalysis(last, basePace, evoSt, evoMag, obj, n, h){
  const pace = last.pace;
  const dist = last.dist;
  const tempo = last.tempo;

  // Classify effort in human terms
  let esforcoLabel, esforcoDesc, esforcoEmoji;
  if(basePace > 480){ // > 8min/km
    esforcoLabel='Trote leve / caminhada acelerada';
    esforcoDesc='Um ritmo bem confortável. Você provavelmente conseguia conversar normalmente durante o treino.';
    esforcoEmoji='😌';
  } else if(basePace > 390){ // 6:30–8:00
    esforcoLabel='Corrida leve';
    esforcoDesc='Um ritmo tranquilo de corrida. Conseguia falar frases curtas, mas não conversar à vontade.';
    esforcoEmoji='🟢';
  } else if(basePace > 330){ // 5:30–6:30
    esforcoLabel='Corrida moderada';
    esforcoDesc='Ritmo médio — exige esforço, mas dá pra manter por bastante tempo.';
    esforcoEmoji='🟡';
  } else if(basePace > 270){ // 4:30–5:30
    esforcoLabel='Corrida forte';
    esforcoDesc='Ritmo forte — difícil de manter por muito tempo. Bom para treinos específicos.';
    esforcoEmoji='🔴';
  } else {
    esforcoLabel='Ritmo de competição';
    esforcoDesc='Ritmo muito forte. Só sustentável por distâncias curtas.';
    esforcoEmoji='💀';
  }

  // What went well
  const pontosBons = [];
  pontosBons.push({
    titulo: 'Você treinou! 👏',
    texto: `${dist}km em ${tempo||'—'} é um ótimo trabalho. O maior passo é sair de casa — você fez isso.`,
    dica: 'Consistência semana a semana é o que transforma iniciantes em corredores.'
  });

  if(basePace > 420){
    pontosBons.push({
      titulo: 'Ritmo confortável ✅',
      texto: 'Correr no ritmo certo (sem se matar) é a coisa mais importante para quem está começando.',
      dica: 'Esse ritmo leve ajuda o corpo a se adaptar, evita lesões e constrói a base que você vai precisar depois.'
    });
  }

  if(dist >= 4){
    pontosBons.push({
      titulo: `Boa distância — ${dist}km! 📏`,
      texto: 'Para o seu objetivo, o tempo em movimento importa mais que a velocidade nesse momento.',
      dica: 'Seu corpo está aprendendo a ser eficiente. Continue aumentando a distância aos poucos.'
    });
  }

  if(last.fcmed > 0 && last.fcmed < 155){
    pontosBons.push({
      titulo: 'Coração trabalhando bem 💚',
      texto: `Frequência cardíaca de ${last.fcmed} bpm é ótima para esse ritmo.`,
      dica: 'Isso mostra que você está na zona certa de esforço — nem fácil demais, nem pesado demais.'
    });
  }

  if(evoSt === 'evolucao'){
    pontosBons.push({
      titulo: 'Você está evoluindo! 📈',
      texto: `Seu ritmo melhorou ${sp(Math.abs(evoMag))}/km em relação aos últimos treinos.`,
      dica: 'O treino está funcionando. Mantenha a frequência e os resultados vão continuar aparecendo.'
    });
  }

  // What to improve
  const melhorar = [];

  if(basePace > 480){
    melhorar.push({
      titulo: 'Inclua trechos de corrida contínua 🏃',
      problema: 'No ritmo atual, seu corpo não está sendo estimulado o suficiente para evoluir na corrida.',
      solucao: 'No próximo treino, tente: 2 minutos correndo + 2 minutos caminhando, repetindo por 20–30 min. A cada semana, aumente 1 minuto na corrida.',
      icon: '💡'
    });
  }

  if(evoSt === 'regressao'){
    melhorar.push({
      titulo: 'Seu ritmo piorou um pouco ⚠️',
      problema: `Comparado com os treinos anteriores, você correu ${sp(Math.abs(evoMag))}/km mais devagar.`,
      solucao: 'Isso é normal e acontece com todo mundo! Pode ser cansaço, sono ruim ou estresse. Descanse bem, beba água e não force essa semana.',
      icon: '😴'
    });
  }

  if(last.cad > 0 && last.cad < 165){
    melhorar.push({
      titulo: 'Experimente dar passos mais curtos e rápidos 👣',
      problema: `Você está dando passos longos (${last.cad} passos por minuto). Passos muito longos forçam mais os joelhos.`,
      solucao: 'Pense em "pisar leve, como se o chão estivesse quente". Passos curtos e rápidos são mais econômicos e reduzem muito o risco de lesão. Não precisa de sensor — só preste atenção.',
      icon: '💡'
    });
  }

  if(last.splits && last.splits.length > 2){
    const sv = last.splits.map(ps);
    const maxS = Math.max(...sv), minS = Math.min(...sv);
    const diff = maxS - minS;
    if(diff > 60){
      melhorar.push({
        titulo: 'Saia mais devagar no começo 🐢➡️🐇',
        problema: `Sua velocidade variou muito — ${sp(minS)}/km no mais rápido e ${sp(maxS)}/km no mais lento. Provavelmente saiu muito rápido e foi diminuindo.`,
        solucao: 'Na próxima corrida: saia mais devagar do que acha que deveria. Nos últimos km, acelere. Esse é o segredo dos corredores experientes.',
        icon: '🎯'
      });
    }
  }

  if(melhorar.length === 0){
    melhorar.push({
      titulo: 'Aumente a distância gradualmente 📈',
      problema: 'Para continuar evoluindo, o corpo precisa de novos estímulos.',
      solucao: `Na próxima semana, tente correr mais ${Math.round(dist * 0.1 * 10) / 10}km do que hoje. Nunca aumente mais de 10% por semana — isso protege seus joelhos e tornozelos.`,
      icon: '💡'
    });
  }

  // Main coaching message
  const coachMsg = getCoachMsg(obj, evoSt, basePace, dist, n);

  return { esforcoLabel, esforcoDesc, esforcoEmoji, pontosBons, melhorar, coachMsg };
}

function getCoachMsg(obj, evoSt, basePace, dist, n){
  const msgs = {
    'primeiro5k': n < 3
      ? 'Você está nos primeiros passos! O objetivo agora é criar o hábito. Não se preocupe com velocidade — foque em aparecer para treinar 3x por semana.'
      : `Você já tem ${n} treinos! Continue assim. Quando conseguir correr 20 minutos sem parar, o 5km vai estar bem perto.`,
    'primeiro10k': `Para chegar nos 10km, o segredo é aumentar a distância devagar — máximo 10% por semana. O treino mais importante é o "treino longo" do final de semana. Sem pressa!`,
    'primeiro15k': `15km é uma ótima meta! Você vai chegar lá aumentando seu treino longo gradualmente. Quando os 10km ficarem confortáveis, os 15km virão naturalmente.`,
    'melhorar5k': `Para melhorar o 5km, você precisa treinar em ritmos diferentes. Não só correr "normal" — inclua momentos mais rápidos e momentos de recuperação. O plano vai te guiar.`,
    'melhorar10k': `Para bater seu tempo no 10km, 80% dos seus treinos devem ser leves (parece fácil demais, mas funciona!) e 20% fortes. Isso é o que os melhores corredores fazem.`,
    'meia': `Meia maratona é um objetivo incrível! O treino longo semanal é o coração do plano. Durma bem — é dormindo que o corpo se adapta.`,
    'maratona': `Maratona é uma jornada longa. Consistência supera intensidade — apareça para treinar toda semana, mesmo que devagar.`,
    'emagrecimento': `Para emagrecer com corrida, o segredo não é correr rápido — é correr por mais tempo, em ritmo confortável. Quanto mais tempo você passa se movendo, mais calorias queima.`,
    'condicionamento': `Correr regularmente em ritmo confortável é uma das melhores coisas que você pode fazer pela saúde. Você está no caminho certo!`,
    'volta': `Voltar a correr depois de uma pausa exige paciência. Seu fôlego volta rápido, mas músculos e articulações precisam de mais tempo. Comece devagar e aumente gradualmente.`,
    'trail10k': `Trail é divertido e desafiador! Em subidas, caminhe rápido — é mais econômico que correr. Nas descidas, passos curtos e rápidos para proteger os joelhos.`,
    'velocidade': `Para ficar mais rápido, paradoxalmente você precisa correr mais devagar na maioria dos treinos. Reserve apenas 1-2 dias por semana para treinos fortes.`,
  };
  let msg = msgs[obj.id] || 'Continue treinando com consistência — é o que faz a diferença no longo prazo.';
  if(evoSt === 'evolucao') msg += ' 🔥 Você está evoluindo — continue!';
  if(evoSt === 'regressao') msg += ' Descanse bem essa semana antes de retomar.';
  return msg;
}

function renderAnalise(){
  const a=computeAnalise();const el=document.getElementById('pn-analise');
  if(!a){el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Sem dados</div><div class="empty-sub">Adicione treinos para ver a análise.</div></div>`;return;}

  const sc=a.score>=90?{c:'var(--neon)',l:'EXCELENTE'}:a.score>=70?{c:'var(--teal)',l:'BOM'}:a.score>=50?{c:'var(--orange)',l:'ATENÇÃO'}:{c:'var(--red)',l:'REVISAR'};
  const ecBadge=a.evoSt==='evolucao'?'badge-neon':a.evoSt==='regressao'?'badge-red':'badge-orange';
  const ecLabel=a.evoSt==='evolucao'?'↑ Melhorando':a.evoSt==='regressao'?'↓ Caiu um pouco':'→ Estável';

  const r=34,cx=40,cy=40,circ=2*Math.PI*r,offset=circ-(a.score/100)*circ;

function renderIAText(text){
  // Convert markdown headings and lists to styled HTML
  const lines = text.split('\n');
  let html = '<div style="font-size:13px;line-height:1.8;color:var(--tx)">';

  for(const line of lines){
    const t = line.trim();
    if(!t){ html += '<div style="height:6px"></div>'; continue; }

    // H1-style: # emoji TÍTULO
    if(/^# [🧠👍⚠️🔍📈🚨🎯🏃📅📊]/.test(t)){
      const title = t.replace(/^# /,'');
      html += `<div style="font-size:14px;font-weight:700;color:var(--neon);margin:16px 0 6px;padding:8px 12px;background:rgba(232,255,0,.06);border-radius:var(--r);border-left:3px solid var(--neon)">${title}</div>`;
    }
    // Bold **text**
    else if(t.startsWith('**') && t.endsWith('**')){
      html += `<div style="font-weight:700;color:var(--tx);margin:4px 0">${t.replace(/\*\*/g,'')}</div>`;
    }
    // Bullet - text
    else if(t.startsWith('- ') || t.startsWith('• ')){
      const item = t.replace(/^[-•] /,'');
      const colored = item.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--neon)">$1</strong>');
      html += `<div style="display:flex;gap:8px;padding:3px 0;padding-left:8px"><span style="color:var(--neon);flex-shrink:0">›</span><span>${colored}</span></div>`;
    }
    // Numbered list
    else if(/^\d+\. /.test(t)){
      const num = t.match(/^(\d+)\. /)[1];
      const item = t.replace(/^\d+\. /,'').replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--neon)">$1</strong>');
      html += `<div style="display:flex;gap:8px;padding:3px 0;padding-left:8px"><span style="color:var(--orange);font-weight:700;flex-shrink:0;font-family:var(--mono);font-size:11px">${num}.</span><span>${item}</span></div>`;
    }
    // Zone lines (Z1/Z2/Z3)
    else if(/Z[123]/.test(t) && t.includes('min/km')){
      const colored = t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
      html += `<div style="padding:6px 12px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--bd);margin:3px 0;font-family:var(--mono);font-size:12px">${colored}</div>`;
    }
    // Score line
    else if(/score|nota|pontos?/i.test(t) && /\d{2,3}/.test(t)){
      const score = t.match(/\d{2,3}/)?.[0];
      const color = score>=90?'var(--neon)':score>=70?'var(--teal)':score>=50?'var(--orange)':'var(--red)';
      html += `<div style="font-size:16px;font-weight:700;color:${color};padding:4px 0">${t.replace(/\*\*/g,'')}</div>`;
    }
    // Regular paragraph
    else {
      const colored = t.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--neon)">$1</strong>');
      html += `<div style="margin:2px 0">${colored}</div>`;
    }
  }

  html += '</div>';
  return html;
}

// ─── Render plan from AI JSON ───────────────────────────────────
function renderPlanSheet(plan, a){
  const days=['seg','ter','qua','qui','sex','sab','dom'];
  const dayLabels=['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];
  const zoneClass={Z1:'ps-z1',Z2:'ps-z2',Z3:'ps-z3',LONGAO:'ps-long',LONG:'ps-long',FORT:'ps-fort',OFF:'ps-off'};
  const zoneColor={Z1:'var(--neon)',Z2:'var(--orange)',Z3:'var(--red)',LONGAO:'var(--teal)',LONG:'var(--teal)',FORT:'var(--purple)',OFF:'var(--tx3)'};

  let html=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
  <table class="plan-sheet">
    <thead><tr>
      <th style="width:40px"></th>
      ${dayLabels.map(d=>`<th>${d}</th>`).join('')}
    </tr></thead>
    <tbody>`;

  plan.semanas.forEach((sem,si)=>{
    const foco=sem.foco||('Semana '+(si+1));
    html+=`<tr>
      <td class="ps-week">SEM ${si+1}</td>`;
    days.forEach(d=>{
      const t=sem.treinos[d]||{tipo:'OFF',descricao:'Descanso',zona:'OFF'};
      const zona=(t.zona||'OFF').toUpperCase().replace('LONGÃO','LONGAO');
      const cls=zoneClass[zona]||'ps-off';
      const col=zoneColor[zona]||'var(--tx3)';
      if(zona==='OFF'){
        html+=`<td class="${cls}">OFF</td>`;
      } else {
        const tipo=t.tipo||zona;
        html+=`<td class="${cls}">
          <div class="ps-type" style="color:${col}">${tipo}</div>
          <div class="ps-desc">${t.descricao||''}</div>
          ${t.pace?`<div class="ps-pace" style="color:${col}">${t.pace}</div>`:''}
        </td>`;
      }
    });
    html+=`</tr>`;
  });

  html+=`</tbody></table></div>`;

  // Add weekly focus summary
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">`;
  plan.semanas.forEach((sem,si)=>{
    html+=`<div class="card" style="padding:10px 12px">
      <div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;margin-bottom:4px">Semana ${si+1}</div>

      ${sem.nota?`<div style="font-size:11px;color:var(--tx2)">${sem.nota}</div>`:''}
    </div>`;
  });
  html+=`</div>`;

  return html;
}

function buildProgNarr(pd,pct,n,a){
  if(pct>=100)return`🎉 Objetivo atingido! De ${sp(HIST[0].paceSec)} para ${sp(a.basePace)}/km em ${n} treinos. Hora de definir um novo desafio!`;
  if(pct>=75)return`Reta final! Faltam ${sp(a.gapSec)}/km para o alvo. Mantenha a consistência.`;
  if(pct>=50)return`Mais da metade do caminho. Melhorou ${sp(Math.abs(pd))}/km em ${n} treinos. As semanas 6–12 costumam mostrar os maiores saltos.`;
  if(pct>=25)return`Boa evolução inicial. Adaptações aeróbicas levam 8–12 semanas para aparecer plenamente (Hawley & Holloszy, 2009). Continue.`;
  return pd>0?`Você melhorou ${sp(pd)}/km desde o início. Com mais dados, as projeções de prazo ficam mais precisas.`:`Dados insuficientes para projeção sólida. Insira pelo menos 5 treinos.`;
}

// ═══════════════════════════════════════════════════
//  UTILITY — pace / time helpers
// ═══════════════════════════════════════════════════
function sp(secs){
  if(!secs||isNaN(secs)||secs<=0) return '—';
  const m=Math.floor(secs/60),s=Math.round(secs%60);
  return `${m}:${String(s).padStart(2,'0')}`;
}
function ps(str){
  if(!str||typeof str!=='string') return 0;
  const p=str.trim().split(':');
  if(p.length===2) return parseInt(p[0])*60+parseInt(p[1]);
  if(p.length===3) return parseInt(p[0])*3600+parseInt(p[1])*60+parseInt(p[2]);
  return 0;
}
function t2s(str){
  if(!str) return 0;
  const p=str.trim().split(':');
  if(p.length===2) return parseInt(p[0])*60+parseInt(p[1]);
  if(p.length===3) return parseInt(p[0])*3600+parseInt(p[1])*60+parseInt(p[2]);
  return 0;
}
function s2t(secs){
  if(!secs||secs<=0) return '—';
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=Math.round(secs%60);
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function computeAnalise(){
  if(!USER_GOAL||!USER_GOAL.onboard_done) return null;

  const last=h[n-1];
  const recent=h.slice(-5).filter(w=>w.paceSec>60&&w.paceSec<900);
  const basePace=recent.length>0?Math.round(recent.reduce((a,w)=>a+w.paceSec,0)/recent.length):last.paceSec;
  let evoSt='estavel',evoMag=0;
  if(n>=3){
    const prev=h.slice(-4,-1).filter(w=>w.paceSec>0);
    if(prev.length>0){const prevAvg=prev.reduce((a,w)=>a+w.paceSec,0)/prev.length;evoMag=prevAvg-basePace;if(evoMag>10)evoSt='evolucao';else if(evoMag<-15)evoSt='regressao';}
  }
  let z={};
  if(USER_GOAL.test_time){z=calcZonesFromTest(USER_GOAL.test_time,USER_GOAL.test_fcmax||0)||{};}
  if(!z||!z.e){
    z={
      e:{min:Math.round(basePace*1.10),max:Math.round(basePace*1.25),label:'Z1 — Base aeróbica',emoji:'🟢',desc:'Conversa normal.',color:'var(--neon)',bg:'var(--neon-dim)'},
      m:{min:Math.round(basePace*1.03),max:Math.round(basePace*1.09),label:'Z1+ — Leve/Moderado',emoji:'🔵',desc:'Frases curtas.',color:'#4da6ff',bg:'rgba(77,166,255,.08)'},
      t:{min:Math.round(basePace*0.95),max:Math.round(basePace*1.02),label:'Z2 — Limiar',emoji:'🟡',desc:'Difícil, sustentável.',color:'var(--orange)',bg:'var(--orange-dim)'},
      i:{min:Math.round(basePace*0.87),max:Math.round(basePace*0.94),label:'Z3 — Intervalo VO2max',emoji:'🔴',desc:'Muito difícil.',color:'var(--red)',bg:'var(--red-dim)'},
      r:{min:Math.round(basePace*0.80),max:Math.round(basePace*0.86),label:'Z3+ — Sprint',emoji:'💀',desc:'Sprint curto.',color:'var(--purple)',bg:'var(--purple-dim)'},
    };
  }
  let score=50;
  if(n>=5)score+=10;if(evoSt==='evolucao')score+=15;if(evoSt==='regressao')score-=10;
  if(last.fcmed>0&&last.fcmed<160)score+=10;if(last.dist>=5)score+=10;if(last.splits&&last.splits.length>1)score+=5;
  score=Math.max(10,Math.min(99,score));
  const tp=USER_GOAL.target_pace_sec||0;
  const startPace=h[0].paceSec;
  let progPct=0,gapSec=0;
  if(tp>0){gapSec=Math.max(0,basePace-tp);const totalGap=startPace-tp;progPct=totalGap>0?Math.min(100,Math.round((startPace-basePace)/totalGap*100)):0;}
  let raceEst='';
  if(obj.dist>0&&basePace>0){raceEst=s2t(Math.round(basePace*obj.dist*1.08));}
  const improvPerWeek=8;
  const weeksETA=tp>0&&gapSec>0?Math.ceil(gapSec/improvPerWeek):obj.weeks||12;
  const etaD=new Date();etaD.setDate(etaD.getDate()+weeksETA*7);
  const etaDate=etaD.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const analysis=buildHumanAnalysis(last,basePace,evoSt,evoMag,obj,n,h);
  return {last,h,n,score,evoSt,evoMag,basePace,z,obj,tp,gapSec,progPct,raceEst,weeksETA,etaDate,analysis};
}

function autoCalcPace(){

  if(pf&&dist>0&&tempo){const dur=t2s(tempo);if(dur>0)pf.value=sp(Math.round(dur/dist));}
}

async function doSaveTreino(){
  const data=document.getElementById('t-data')?.value;
  const dist=parseFloat(document.getElementById('t-dist')?.value);
  const tempo=document.getElementById('t-tempo')?.value?.trim();
  let pace=document.getElementById('t-pace')?.value?.trim();
  const fcmed=parseInt(document.getElementById('t-fcmed')?.value)||0;
  const fcmax=parseInt(document.getElementById('t-fcmax')?.value)||0;
  const cad=parseInt(document.getElementById('t-cad')?.value)||0;
  const elev=parseInt(document.getElementById('t-elev')?.value)||0;
  const splitsRaw=document.getElementById('t-splits')?.value?.trim()||'';
  const pse=window._pseVal||0;
  if(!data||!dist||dist<=0){showSaveMsg('Informe pelo menos a data e a distância.','err');return;}
  if(!pace&&tempo){const d=t2s(tempo);if(d>0)pace=sp(Math.round(d/dist));}
  if(!pace){showSaveMsg('Informe o pace ou a duração.','err');return;}
  const splits=splitsRaw?splitsRaw.split(',').map(s=>s.trim()).filter(Boolean):null;
  showSaveMsg('Salvando...','ok');
  await saveWorkout({data:data.split('-').reverse().join('/'),dist,tempo:tempo||null,pace,fcmed,fcmax,cad,splits,elev,pse});
  showSaveMsg('✓ Treino salvo!','ok');
  setTimeout(()=>goTab('analise'),1200);
}

}

function handleTestFileUpload(input){
  const f=input.files[0];
  if(!f) return;
  const st=document.getElementById('ob-upload-status');
  if(st){st.style.display='block';st.style.background='var(--bg3)';st.style.color='var(--tx2)';st.style.borderColor='var(--bd)';st.textContent='Lendo arquivo do teste...';}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const name=f.name.toLowerCase();
      let r=null;
      if(name.endsWith('.gpx'))       r=parseGPX(e.target.result);
      else if(name.endsWith('.tcx'))  r=parseTCX(e.target.result);
      else if(name.endsWith('.json')) r=parseJSON(e.target.result);
      else{if(st){st.style.background='var(--red-dim)';st.style.color='var(--red)';st.style.borderColor='var(--red)';st.textContent='Formato não suportado. Use GPX ou TCX.';}return;}

      if(r&&r.durSec>0){

        const tField=document.getElementById('ob-test-time');
        const fcField=document.getElementById('ob-test-fcmax');
        if(tField){
          const mins=Math.floor(r.durSec/60);
          const secs=Math.round(r.durSec%60);
          const timeStr=mins+':'+String(secs).padStart(2,'0');
          tField.value=timeStr;
          OB_TEST_TIME=timeStr;
        }
        if(fcField&&r.fcmax>0){
          fcField.value=r.fcmax;
          OB_TEST_FCMAX=r.fcmax;
        }
        const distInfo=r.dist>0?` | ${r.dist}km`:'';
        const fcInfo=r.fcmax>0?` | FC máx: ${r.fcmax} bpm`:'';
        if(st){st.style.background='var(--teal-dim)';st.style.color='var(--teal)';st.style.borderColor='var(--teal)';st.textContent='✓ Arquivo lido! Tempo: '+tField.value+distInfo+fcInfo+' — confirme abaixo e clique em Começar.';}
        renderHome(); // re-render to show the preview zones
      } else {
        if(st){st.style.background='var(--red-dim)';st.style.color='var(--red)';st.style.borderColor='var(--red)';st.textContent='Não foi possível extrair o tempo do arquivo. Insira manualmente.';}
      }
    }catch(err){
      if(st){st.style.background='var(--red-dim)';st.style.color='var(--red)';st.style.borderColor='var(--red)';st.textContent='Erro ao ler arquivo: '+err.message;}
    }
  };
  reader.readAsText(f);
}

function handleFileUpload(input){const f=input.files[0];if(f)processFile(f);}

function processFile(file){
  showUploadStatus('Lendo arquivo...','');
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const name=file.name.toLowerCase();
      let r=null;
      if(name.endsWith('.gpx'))       r=parseGPX(e.target.result);
      else if(name.endsWith('.tcx'))  r=parseTCX(e.target.result);
      else if(name.endsWith('.json')) r=parseJSON(e.target.result);
      else if(name.endsWith('.csv'))  r=parseCSV(e.target.result);
      else{showUploadStatus('Formato não suportado.','err');return;}
      if(r){fillFormFromFile(r);showUploadStatus('✓ Arquivo lido! Confira os dados e salve.','ok');}
      else showUploadStatus('Não foi possível ler o arquivo. Insira manualmente.','err');
    }catch(err){showUploadStatus('Erro: '+err.message,'err');}
  };
  reader.readAsText(file);
}

function showUploadStatus(msg,type){

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function parseGPX(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  const pts=[...doc.querySelectorAll('trkpt,rtept')];
  if(!pts.length) return null;

  const times=pts.map(p=>{
    const t=p.querySelector('time');
    const d=t?new Date(t.textContent):null;
    return d&&+d>0?d:null;
  });
  const lats=pts.map(p=>parseFloat(p.getAttribute('lat')));
  const lons=pts.map(p=>parseFloat(p.getAttribute('lon')));

  // HR — try multiple namespace variants
  const hrs=[];
  pts.forEach(p=>{
    const hrEl=p.querySelector('hr')||
               p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v1','hr')[0]||
               p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v2','hr')[0];
    const v=hrEl?parseInt(hrEl.textContent):0;
    if(v>40&&v<230) hrs.push(v);
  });

  // Cadence
  const cads=[];
  pts.forEach(p=>{
    const cEl=p.querySelector('cad')||
               p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v1','cad')[0];
    const v=cEl?parseInt(cEl.textContent)*2:0;
    if(v>100&&v<240) cads.push(v);
  });

  // Elevation gain
  let elevGain=0;
  const elevs=pts.map(p=>parseFloat(p.querySelector('ele')?.textContent||NaN));
  for(let i=1;i<elevs.length;i++){if(!isNaN(elevs[i])&&!isNaN(elevs[i-1])&&elevs[i]-elevs[i-1]>0)elevGain+=elevs[i]-elevs[i-1];}

  // Distance via haversine
  let dist=0;
  for(let i=1;i<lats.length;i++){
    if(!isNaN(lats[i])&&!isNaN(lons[i])&&!isNaN(lats[i-1])&&!isNaN(lons[i-1]))
      dist+=haversine(lats[i-1],lons[i-1],lats[i],lons[i]);
  }
  dist=Math.round(dist*100)/100;

  const validTimes=times.filter(Boolean);
  const durSec=validTimes.length>=2?(+validTimes[validTimes.length-1]-+validTimes[0])/1000:0;
  const fcmed=hrs.length?Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length):0;
  const fcmax=hrs.length?Math.max(...hrs):0;
  const cadAvg=cads.length?Math.round(cads.reduce((a,b)=>a+b,0)/cads.length):0;

  // Splits per km
  const splits=[];let cumDist=0,lastKm=0,lastT=validTimes[0];
  for(let i=1;i<pts.length;i++){
    if(isNaN(lats[i])||isNaN(lons[i])) continue;
    cumDist+=haversine(lats[i-1],lons[i-1],lats[i],lons[i]);
    if(cumDist>=lastKm+1&&times[i]&&lastT){
      const sec=(+times[i]-+lastT)/1000;
      if(sec>0)splits.push(sp(Math.round(sec)));
      lastT=times[i];lastKm=Math.floor(cumDist);
    }
  }
  return {dist,durSec,fcmed,fcmax,cad:cadAvg,elevGain:Math.round(elevGain),splits,date:validTimes[0]||new Date()};
}

function parseTCX(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  const ns='http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2';
  const ns2='http://www.garmin.com/xmlschemas/ActivityExtension/v2';
  const tps=[...doc.getElementsByTagNameNS(ns,'Trackpoint')];
  if(!tps.length) return null;

  let distMax=0,fcSum=0,fcCnt=0,fcmax=0,elevGain=0,prevElev=null;
  let cadSum=0,cadCnt=0;
  const times=[];const lats=[];const lons=[];

  tps.forEach(tp=>{
    const t=tp.getElementsByTagNameNS(ns,'Time')[0]?.textContent;if(t)times.push(new Date(t));
    const d=parseFloat(tp.getElementsByTagNameNS(ns,'DistanceMeters')[0]?.textContent||0);if(d>distMax)distMax=d;
    const hr=parseInt(tp.getElementsByTagNameNS(ns,'Value')[0]?.textContent||0);
    if(hr>40&&hr<230){fcSum+=hr;fcCnt++;if(hr>fcmax)fcmax=hr;}
    const el=parseFloat(tp.getElementsByTagNameNS(ns,'AltitudeMeters')[0]?.textContent||NaN);
    if(!isNaN(el)){if(prevElev!==null&&el-prevElev>0)elevGain+=el-prevElev;prevElev=el;}
    // Cadence via extension
    const cadEl=tp.getElementsByTagNameNS(ns2,'RunCadence')[0]||tp.getElementsByTagNameNS(ns,'Cadence')[0];
    const cad=cadEl?parseInt(cadEl.textContent)*2:0;
    if(cad>100&&cad<240){cadSum+=cad;cadCnt++;}
    // Position
    const latEl=tp.getElementsByTagNameNS(ns,'LatitudeDegrees')[0];
    const lonEl=tp.getElementsByTagNameNS(ns,'LongitudeDegrees')[0];
    if(latEl&&lonEl){lats.push(parseFloat(latEl.textContent));lons.push(parseFloat(lonEl.textContent));}
  });

  const dist=distMax>0?Math.round(distMax/10)/100:0;
  const durSec=times.length>=2?(+times[times.length-1]-+times[0])/1000:0;

  // Splits per km using positions if available
  const splits=[];
  if(lats.length>=2&&times.length>=2){
    let cumDist=0,lastKm=0,lastT=times[0];
    for(let i=1;i<lats.length;i++){
      cumDist+=haversine(lats[i-1],lons[i-1],lats[i],lons[i]);
      if(cumDist>=lastKm+1&&times[i]){
        const splitSec=(+times[i]-+lastT)/1000;
        if(splitSec>0)splits.push(sp(Math.round(splitSec)));
        lastT=times[i];lastKm=Math.floor(cumDist);
      }
    }
  }

  return {
    dist,durSec,
    fcmed:fcCnt?Math.round(fcSum/fcCnt):0,fcmax,
    cad:cadCnt?Math.round(cadSum/cadCnt):0,
    elevGain:Math.round(elevGain),
    splits,date:times[0]||new Date()
  };
}

function parseJSON(txt){
  const d=JSON.parse(txt);
  return {dist:parseFloat(d.distance||d.dist||0),durSec:t2s(d.time||d.tempo||d.duration||''),
    fcmed:parseInt(d.avg_hr||d.fcmed||0),fcmax:parseInt(d.max_hr||d.fcmax||0),
    elevGain:parseInt(d.elevation||d.elev||0),splits:d.splits||[],date:new Date(d.date||d.data||Date.now())};
}

function parseCSV(txt){
  const lines=txt.trim().split('\n');if(lines.length<2)return null;
  const hdr=lines[0].split(',').map(h=>h.trim().toLowerCase());
  const row=lines[1].split(',').map(v=>v.trim());
  const get=k=>row[hdr.indexOf(k)]||'';
  return {dist:parseFloat(get('distance')||get('dist')||0),durSec:t2s(get('time')||get('duration')||get('tempo')||''),
    fcmed:parseInt(get('avg_hr')||get('fcmed')||0),fcmax:parseInt(get('max_hr')||get('fcmax')||0),
    elevGain:parseInt(get('elevation')||get('elev')||0),splits:[],date:new Date(get('date')||Date.now())};
}

function fillFormFromFile(r){
  const dateStr=r.date?r.date.toISOString().split('T')[0]:new Date().toISOString().split('T')[0];
  const setV=(id,v)=>{const el=document.getElementById(id);if(el&&v)el.value=v;};
  setV('t-data',dateStr);
  if(r.dist>0) setV('t-dist',r.dist);
  if(r.durSec>0){
    const ts=s2t(Math.round(r.durSec));
    setV('t-tempo',ts);
    if(r.dist>0) setV('t-pace',sp(Math.round(r.durSec/r.dist)));
  }
  if(r.fcmed>0) setV('t-fcmed',r.fcmed);
  if(r.fcmax>0) setV('t-fcmax',r.fcmax);
  if(r.cad>0)   setV('t-cad',r.cad);
  if(r.elevGain>0) setV('t-elev',r.elevGain);
  if(r.splits&&r.splits.length>0) setV('t-splits',r.splits.join(', '));
}

//  ONBOARDING ACTIONS
// ═══════════════════════════════════════════════════
function obPickObj(id){OB_OBJ=OBJS.find(o=>o.id===id)||null;OB_TARGET_PACE='';OB_TARGET_DATE='';renderHome();}

function obNext(step){
  if(step===1){if(!OB_OBJ)return;OB_STEP=2;}
  else if(step===2){if(!OB_NIVEL)return;OB_STEP=3;}
  else if(step===3){OB_STEP=4;}
  renderHome();
}

async function obFinish(){
  if(!OB_TEST_TIME)return;
  const vam=calcZonesFromTest(OB_TEST_TIME,OB_TEST_FCMAX)||{};
  await saveGoal({
    obj_id:OB_OBJ.id,nivel:OB_NIVEL,nivel_label:OB_NIVEL_LABEL||OB_NIVEL,
    dias_semana:OB_DIAS||3,target_pace_sec:OB_TARGET_PACE?ps(OB_TARGET_PACE):0,
    target_date:OB_TARGET_DATE||null,onboard_done:true,
    test_time:OB_TEST_TIME,test_fcmax:OB_TEST_FCMAX||0,
    vam_pace:vam._vam?vam._vam.pace:0
  });
  renderHome();
}

function resetGoal(){
  if(!confirm('Isso vai reiniciar sua configuração de objetivo. Continuar?'))return;
  OB_STEP=1;OB_OBJ=null;OB_NIVEL=null;OB_NIVEL_LABEL='';OB_DIAS=3;
  OB_TARGET_PACE='';OB_TARGET_DATE='';OB_TEST_TIME='';OB_TEST_FCMAX=0;
  USER_GOAL=null;renderHome();
}

// ═══════════════════════════════════════════════════
//  DELETE WORKOUT
// ═══════════════════════════════════════════════════
async function doDelete(id){
  if(!confirm('Excluir este treino?'))return;
  await deleteWorkout(id);
  renderEvolucao();
}

</script>
