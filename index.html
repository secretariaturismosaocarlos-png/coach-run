function buildTestAnalysis(testTime, fcmax, extra){
  const z=calcZonesFromTest(testTime, fcmax);
  if(!z) return '<div style="font-size:12px;color:var(--tx2)">Tempo inválido. Ex: 21:22</div>';

  const secs=t2s(testTime);
  const vam=z._vam;
  const dist=extra.dist||3;
  const durSec=extra.durSec||secs;
  const pace=sp(Math.round(durSec/dist));
  const fcmed=extra.fcmed||0;
  const elevGain=extra.elevGain||0;
  const cad=extra.cad||0;
  const splits=extra.splits||[];

  // Pacing analysis from splits
  let paceAnalysis='';
  if(splits.length>=2){
    const sv=splits.map(s=>t2s(s));
    const first=sv[0],last=sv[sv.length-1];
    const diff=last-first;
    if(diff>30) paceAnalysis='⚠️ Saiu muito rápido e desacelerou — pacing irregular';
    else if(diff<-15) paceAnalysis='✅ Acelerou progressivamente — excelente pacing';
    else paceAnalysis='✅ Ritmo uniforme e controlado';
  }

  // Effort assessment
  let effortLabel='', effortColor='var(--neon)';
  if(fcmax>0&&fcmed>0){
    const pct=Math.round(fcmed/fcmax*100);
    if(pct>92){effortLabel=`FC média em ${pct}% da FCmax — esforço máximo`;effortColor='var(--red)';}
    else if(pct>85){effortLabel=`FC média em ${pct}% da FCmax — esforço alto`;effortColor='var(--orange)';}
    else{effortLabel=`FC média em ${pct}% da FCmax — esforço controlado`;effortColor='var(--teal)';}
  }

  // Zones HTML
  const zonesHtml=Object.values(z).filter(zv=>zv.label).map(zv=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 10px;border-radius:7px;margin-bottom:4px;background:${zv.bg}">
      <div>
        <span style="font-size:12px;font-weight:700;color:${zv.color}">${zv.emoji} ${zv.label}</span>
        <div style="font-size:10px;color:var(--tx2)">${zv.desc}</div>
      </div>
      <span style="font-family:var(--mono);font-size:12px;font-weight:700;color:${zv.color}">${sp(zv.min)}–${sp(zv.max)}</span>
    </div>`
  ).join('');

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div style="background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Pace médio</div>
        <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--neon)">${pace}</div>
        <div style="font-size:10px;color:var(--tx2)">min/km</div>
      </div>
      <div style="background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">VAM</div>
        <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--teal)">${vam.kmh}</div>
        <div style="font-size:10px;color:var(--tx2)">km/h</div>
      </div>
      ${fcmax>0?`<div style="background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">FC Máxima</div>
        <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--red)">${fcmax}</div>
        <div style="font-size:10px;color:var(--tx2)">bpm</div>
      </div>`:''}
      ${fcmed>0?`<div style="background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">FC Média</div>
        <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--orange)">${fcmed}</div>
        <div style="font-size:10px;color:var(--tx2)">bpm</div>
      </div>`:''}
      ${cad>0?`<div style="background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Cadência</div>
        <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--purple)">${cad}</div>
        <div style="font-size:10px;color:var(--tx2)">passos/min</div>
      </div>`:''}
      ${elevGain>0?`<div style="background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Elevação</div>
        <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--teal)">${elevGain}m</div>
        <div style="font-size:10px;color:var(--tx2)">ganho total</div>
      </div>`:''}
    </div>

    ${splits.length>0?`<div style="margin-bottom:10px">
      <div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Splits por km</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${splits.map((s,i)=>{
          const sv=splits.map(x=>t2s(x));
          const mn=Math.min(...sv),mx=Math.max(...sv);
          const v=t2s(s);
          const col=v===mn?'var(--neon)':v===mx?'var(--red)':'var(--tx2)';
          return `<div style="padding:4px 10px;border-radius:16px;background:var(--bg4);border:1px solid var(--bd);font-family:var(--mono);font-size:11px;font-weight:700;color:${col}">km${i+1} ${s}</div>`;
        }).join('')}
      </div>
      ${paceAnalysis?`<div style="font-size:11px;color:var(--tx2);margin-top:5px">${paceAnalysis}</div>`:''}
    </div>`:''}

    ${effortLabel?`<div style="font-size:11px;color:${effortColor};margin-bottom:10px;padding:6px 10px;background:${effortColor}22;border-radius:var(--r);border-left:3px solid ${effortColor}">${effortLabel}</div>`:''}

    <div style="font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Suas zonas de treinamento</div>
    ${zonesHtml}
  `;
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function parseGPX(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  const pts=[...doc.querySelectorAll('trkpt,rtept')];
  if(!pts.length) return null;

  // ── Timestamps ──
  const times=pts.map(p=>{
    const t=p.querySelector('time');
    const d=t?new Date(t.textContent.trim()):null;
    return d&&!isNaN(+d)?d:null;
  });

  // ── Coordinates — robust parsing ──
  const lats=pts.map(p=>{
    const v=parseFloat(String(p.getAttribute('lat')||'').replace(',','.'));
    return (isNaN(v)||v<-90||v>90)?NaN:v;
  });
  const lons=pts.map(p=>{
    const v=parseFloat(String(p.getAttribute('lon')||'').replace(',','.'));
    return (isNaN(v)||v<-180||v>180)?NaN:v;
  });

  // ── HR — multiple namespace variants ──
  const hrs=[];
  pts.forEach(p=>{
    // Try all common HR tag names
    const candidates=['hr','HeartRateBpm','Value'];
    let val=0;
    for(const tag of candidates){
      const el=p.querySelector(tag)||
               p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v1',tag)[0]||
               p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v2',tag)[0];
      if(el){val=parseInt(el.textContent);break;}
    }
    if(val>40&&val<230) hrs.push(val);
  });

  // ── Cadence ──
  const cads=[];
  pts.forEach(p=>{
    const candidates=['cad','RunCadence','Cadence'];
    let val=0;
    for(const tag of candidates){
      const el=p.querySelector(tag)||
               p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v1',tag)[0]||
               p.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v2',tag)[0];
      if(el){val=parseInt(el.textContent);break;}
    }
    // GPX cad is one-foot steps/min, multiply by 2 for both feet
    if(val>50&&val<120) val=val*2;
    if(val>100&&val<240) cads.push(val);
  });

  // ── Elevation ──
  let elevGain=0;
  const elevs=pts.map(p=>{
    const el=p.querySelector('ele');
    return el?parseFloat(el.textContent):NaN;
  });
  for(let i=1;i<elevs.length;i++){
    if(!isNaN(elevs[i])&&!isNaN(elevs[i-1])&&elevs[i]-elevs[i-1]>0.5)
      elevGain+=elevs[i]-elevs[i-1];
  }

  // ── Distance via haversine ──
  let dist=0;
  let validCoords=0;
  for(let i=1;i<lats.length;i++){
    if(!isNaN(lats[i])&&!isNaN(lons[i])&&!isNaN(lats[i-1])&&!isNaN(lons[i-1])){
      dist+=haversine(lats[i-1],lons[i-1],lats[i],lons[i]);
      validCoords++;
    }
  }
  dist=Math.round(dist*100)/100;

  // ── Duration ──
  const validTimes=times.filter(Boolean);
  const durSec=validTimes.length>=2?(+validTimes[validTimes.length-1]-+validTimes[0])/1000:0;

  // ── Splits per km ──
  const splits=[];
  let cumDist=0,lastKm=0,lastT=validTimes[0]; // cumDist also used as dist fallback
  for(let i=1;i<pts.length;i++){
    if(isNaN(lats[i])||isNaN(lons[i])) continue;
    cumDist+=haversine(lats[i-1],lons[i-1],lats[i],lons[i]);
    if(cumDist>=lastKm+1&&times[i]&&lastT){
      const sec=(+times[i]-+lastT)/1000;
      if(sec>0)splits.push(sp(Math.round(sec)));
      lastT=times[i];lastKm=Math.floor(cumDist);
    }
  }

  // ── Fallback 1: check common distance tags ──
  if(dist<0.1){
    const distSelectors = [
      'distance','Distance','totalDistance','TotalDistanceMeters',
      'DistanceMeters','totalDistanceMeters','ns3\:DistanceMeters'
    ];
    for(const sel of distSelectors){
      try{
        const el = doc.querySelector(sel);
        if(el){
          const v=parseFloat(el.textContent);
          if(v>0){ dist=v>1000?Math.round(v/10)/100:Math.round(v*100)/100; break; }
        }
      }catch(e){}
    }
  }

  // ── Fallback 2: parse from <Track> distance attributes ──
  if(dist<0.1){
    const trackPoints = doc.querySelectorAll('Trackpoint,trkpt,rtept');
    if(trackPoints.length>1){
      // Get first and last distance values if present
      const dists = [];
      trackPoints.forEach(tp=>{
        const d=tp.querySelector('DistanceMeters,distance');
        if(d){ const v=parseFloat(d.textContent); if(v>0) dists.push(v); }
      });
      if(dists.length>0){
        const maxDist=Math.max(...dists);
        if(maxDist>0) dist=maxDist>1000?Math.round(maxDist/10)/100:Math.round(maxDist*100)/100;
      }
    }
  }

  // ── Fallback 3: estimate from pace+time if we have both ──
  if(dist<0.1&&durSec>60&&paceArr.length>0){
    const avgPace=paceArr.reduce((a,b)=>a+b,0)/paceArr.length;
    if(avgPace>60&&avgPace<900){
      dist=Math.round(durSec/avgPace*100)/100;
    }
  }

  // ── Fallback 4: estimate from splits ──
  if(dist<0.1&&splits.length>0&&durSec>0){
    const splitSecs=splits.map(s=>t2s(s)).filter(v=>v>0);
    if(splitSecs.length>0){
      const avgPaceSec=splitSecs.reduce((a,b)=>a+b,0)/splitSecs.length;
      const remainingSec=Math.max(0,durSec-splitSecs.reduce((a,b)=>a+b,0));
      const remainingKm=avgPaceSec>0?remainingSec/avgPaceSec:0;
      dist=Math.round((splitSecs.length+remainingKm)*100)/100;
    }
  }

  // ── Fallback 5: cumulative distance from GPS loop ──
  if(dist<0.1&&cumDist>0.1){
    dist=Math.round(cumDist*100)/100;
  }

  const fcmed=hrs.length?Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length):0;
  const fcmax=hrs.length?Math.max(...hrs):0;
  const cadAvg=cads.length?Math.round(cads.reduce((a,b)=>a+b,0)/cads.length):0;

  return {
    dist,durSec,fcmed,fcmax,
    cad:cadAvg,
    elevGain:Math.round(elevGain),
    splits,
    date:validTimes[0]||new Date()
  };
}

function parseTCX(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  const ns='http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2';
  const ns2='http://www.garmin.com/xmlschemas/ActivityExtension/v2';
  const tps=[...doc.getElementsByTagNameNS(ns,'Trackpoint')];
  if(!tps.length) return null;

  let distMax=0,fcSum=0,fcCnt=0,fcmax=0,elevGain=0,prevElev=null;
  let cadSum=0,cadCnt=0;
  const times=[];const lats=[];const lons=[];

  tps.forEach(tp=>{
    const t=tp.getElementsByTagNameNS(ns,'Time')[0]?.textContent;if(t)times.push(new Date(t));
    const d=parseFloat(tp.getElementsByTagNameNS(ns,'DistanceMeters')[0]?.textContent||0);if(d>distMax)distMax=d;
    const hr=parseInt(tp.getElementsByTagNameNS(ns,'Value')[0]?.textContent||0);
    if(hr>40&&hr<230){fcSum+=hr;fcCnt++;if(hr>fcmax)fcmax=hr;}
    const el=parseFloat(tp.getElementsByTagNameNS(ns,'AltitudeMeters')[0]?.textContent||NaN);
    if(!isNaN(el)){if(prevElev!==null&&el-prevElev>0)elevGain+=el-prevElev;prevElev=el;}
    // Cadence via extension
    const cadEl=tp.getElementsByTagNameNS(ns2,'RunCadence')[0]||tp.getElementsByTagNameNS(ns,'Cadence')[0];
    const cad=cadEl?parseInt(cadEl.textContent)*2:0;
    if(cad>100&&cad<240){cadSum+=cad;cadCnt++;}
    // Position
    const latEl=tp.getElementsByTagNameNS(ns,'LatitudeDegrees')[0];
    const lonEl=tp.getElementsByTagNameNS(ns,'LongitudeDegrees')[0];
    if(latEl&&lonEl){lats.push(parseFloat(latEl.textContent));lons.push(parseFloat(lonEl.textContent));}
  });

  const dist=distMax>0?Math.round(distMax/10)/100:0;
  const durSec=times.length>=2?(+times[times.length-1]-+times[0])/1000:0;

  // Splits per km using positions if available
  const splits=[];
  if(lats.length>=2&&times.length>=2){
    let cumDist=0,lastKm=0,lastT=times[0];
    for(let i=1;i<lats.length;i++){
      cumDist+=haversine(lats[i-1],lons[i-1],lats[i],lons[i]);
      if(cumDist>=lastKm+1&&times[i]){
        const splitSec=(+times[i]-+lastT)/1000;
        if(splitSec>0)splits.push(sp(Math.round(splitSec)));
        lastT=times[i];lastKm=Math.floor(cumDist);
      }
    }
  }

  return {
    dist,durSec,
    fcmed:fcCnt?Math.round(fcSum/fcCnt):0,fcmax,
    cad:cadCnt?Math.round(cadSum/cadCnt):0,
    elevGain:Math.round(elevGain),
    splits,date:times[0]||new Date()
  };
}

function parseJSON(txt){
  const d=JSON.parse(txt);
  return {dist:parseFloat(d.distance||d.dist||0),durSec:t2s(d.time||d.tempo||d.duration||''),
    fcmed:parseInt(d.avg_hr||d.fcmed||0),fcmax:parseInt(d.max_hr||d.fcmax||0),
    elevGain:parseInt(d.elevation||d.elev||0),splits:d.splits||[],date:new Date(d.date||d.data||Date.now())};
}

function parseCSV(txt){
  const lines=txt.trim().split('\n');if(lines.length<2)return null;
  const hdr=lines[0].split(',').map(h=>h.trim().toLowerCase());
  const row=lines[1].split(',').map(v=>v.trim());
  const get=k=>row[hdr.indexOf(k)]||'';
  return {dist:parseFloat(get('distance')||get('dist')||0),durSec:t2s(get('time')||get('duration')||get('tempo')||''),
    fcmed:parseInt(get('avg_hr')||get('fcmed')||0),fcmax:parseInt(get('max_hr')||get('fcmax')||0),
    elevGain:parseInt(get('elevation')||get('elev')||0),splits:[],date:new Date(get('date')||Date.now())};
}

function fillFormFromFile(r){
  const dateStr=r.date?r.date.toISOString().split('T')[0]:new Date().toISOString().split('T')[0];
  const setV=(id,v)=>{const el=document.getElementById(id);if(el&&v!==undefined&&v!==null&&v!=='')el.value=v;};

  setV('t-data',dateStr);

  // Always set distance — calculate if not directly in file
  if(r.dist>0){
    setV('t-dist',r.dist);
  } else if(r.durSec>0 && r.splits && r.splits.length>0){
    // Estimate from splits
    const avgSplitSec = r.splits.map(s=>t2s(s)).reduce((a,b)=>a+b,0)/r.splits.length;
    if(avgSplitSec>0){
      const estDist = Math.round((r.durSec/avgSplitSec)*10)/10;
      if(estDist>0) setV('t-dist',estDist);
    }
  }

  if(r.durSec>0){
    setV('t-tempo',s2t(Math.round(r.durSec)));
  }

  // Auto-calculate pace from dist+time, or from splits average
  if(r.dist>0&&r.durSec>0){
    setV('t-pace',sp(Math.round(r.durSec/r.dist)));
  } else if(r.splits&&r.splits.length>0){
    const avgSec=r.splits.map(s=>t2s(s)).reduce((a,b)=>a+b,0)/r.splits.length;
    if(avgSec>0) setV('t-pace',sp(Math.round(avgSec)));
  }

  if(r.fcmed>0) setV('t-fcmed',r.fcmed);
  if(r.fcmax>0) setV('t-fcmax',r.fcmax);
  if(r.cad>0)   setV('t-cad',r.cad);
  if(r.elevGain>0) setV('t-elev',r.elevGain);
  if(r.splits&&r.splits.length>0) setV('t-splits',r.splits.join(', '));

  // Trigger auto-calc in case some fields are still missing
  setTimeout(autoCalcPace, 100);
}

function obPickObj(id){
  OB_OBJ=OBJS.find(o=>o.id===id)||null;
  OB_TARGET_PACE='';
  OB_TARGET_DATE='';
  if(OB_OBJ) window._obSelCat=OB_OBJ.cat;
  renderHome();
}

function obToggleDay(id){
  if(OB_DIAS_SELECIONADOS.includes(id)){
    OB_DIAS_SELECIONADOS=OB_DIAS_SELECIONADOS.filter(d=>d!==id);
  } else {
    OB_DIAS_SELECIONADOS=[...OB_DIAS_SELECIONADOS,id];
  }
  // Sort by week order
  const order=['seg','ter','qua','qui','sex','sab','dom'];
  OB_DIAS_SELECIONADOS.sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  OB_DIAS=OB_DIAS_SELECIONADOS.length;
  renderHome();
}

function obNext(step){
  if(step===1){
    if(!OB_OBJ) return;
    // If has pace options, require selection
    if(OB_OBJ.hasPace && (!OB_TARGET_PACE || OB_TARGET_PACE==='outro')) return;
    // Convert pace option to seconds for target
    if(OB_TARGET_PACE && OB_TARGET_PACE!=='outro'){
      // keep as string, will be parsed in obFinish
    }
    OB_STEP=2;
  }
  else if(step===2){if(!OB_NIVEL)return;OB_STEP=3;}
  else if(step===3){if(OB_DIAS_SELECIONADOS.length<2)return;OB_STEP=4;}
  renderHome();
}

async function obFinish(){
  if(!OB_TEST_TIME)return;
  const vam=calcZonesFromTest(OB_TEST_TIME,OB_TEST_FCMAX)||{};
  const td=window._obTestData||{};
  await saveGoal({
    obj_id:OB_OBJ.id,nivel:OB_NIVEL,nivel_label:OB_NIVEL_LABEL||OB_NIVEL,
    dias_semana:OB_DIAS||3,tempo_treino:OB_TEMPO_TREINO||45,tempo_longao:OB_TEMPO_LONGAO||0,dias_selecionados:OB_DIAS_SELECIONADOS.length>0?OB_DIAS_SELECIONADOS:null,target_pace_sec:OB_TARGET_PACE?ps(OB_TARGET_PACE):0,
    target_date:OB_TARGET_DATE||null,onboard_done:true,
    test_time:OB_TEST_TIME,test_fcmax:OB_TEST_FCMAX||0,
    vam_pace:vam._vam?vam._vam.pace:0,
    // Store full test data for accurate analysis
    test_dist:td.dist||3,
    test_fcmed:td.fcmed||0,
    test_cad:td.cad||0,
    test_elev:td.elevGain||0,
    test_splits:td.splits||[]
  });
  renderHome();
}

function resetGoal(){
  if(!confirm('Isso vai reiniciar sua configuração de objetivo. Continuar?'))return;
  OB_STEP=1;OB_OBJ=null;OB_NIVEL=null;OB_NIVEL_LABEL='';OB_DIAS=3;window._obSelCat='5K';
  OB_TARGET_PACE='';OB_TARGET_DATE='';OB_TEST_TIME='';OB_TEST_FCMAX=0;
  USER_GOAL=null;renderHome();
}

async function loadRaces(){
  try{
    const {data}=await db.from('user_races').select('*').eq('user_id',CU.id).order('data');
    RACES=(data||[]);
  }catch(e){RACES=[];}
}

async function saveRace(r){
  try{
    const {data,error}=await db.from('user_races').insert({user_id:CU.id,...r}).select().single();
    if(data) RACES.push(data);
    return !error;
  }catch(e){return false;}
}

  await db.from('user_races').delete().eq('id',id).eq('user_id',CU.id);

                <div style="font-size:9px;color:var(--tx3);text-transform:uppercase">${monthNames[month].slice(0,3)}</div>
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:700;color:var(--tx);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.nome}</div>
                ${r.local?`<div style="font-size:11px;color:var(--tx2)">📍 ${r.local}</div>`:''}
                ${r.distancia?`<span class="race-dist-badge" style="margin-top:4px;display:inline-block;background:${distColor(r.distancia)}22;color:${distColor(r.distancia)}">${r.distancia}</span>`:''}
              </div>
              <button onclick="doDeleteRace('${r.id}')" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:14px;padding:2px 4px;flex-shrink:0">✕</button>
            </div>`).join('')
        }
      </div>

      <!-- RIGHT: Calendar -->
      <div class="card" style="padding:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <button onclick="changeRaceMonth(-1)" style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">‹</button>
          <div style="font-size:14px;font-weight:700;color:var(--tx)">${monthNames[month]} ${year}</div>
          <button onclick="changeRaceMonth(1)" style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">›</button>
        </div>
        <div class="race-month-grid">${calHtml}</div>
      </div>


    </div>
  </div>`;
}

function changeRaceMonth(dir){
  RACE_VIEW_DATE=new Date(RACE_VIEW_DATE.getFullYear(), RACE_VIEW_DATE.getMonth()+dir, 1);
  renderCorridas();
}

function scrollToRaceDay(day){
  const padDay=String(day).padStart(2,'0');
  const el=document.getElementById('race-'+padDay+'-'+
    String(RACE_VIEW_DATE.getMonth()+1).padStart(2,'0')+'-'+
    RACE_VIEW_DATE.getFullYear());
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function openAddRaceModal(){
  const today=new Date().toISOString().split('T')[0];
  const modal=document.createElement('div');
  modal.className='race-form-modal';
  modal.innerHTML=`<div class="race-form-inner">
    <div style="width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 16px"></div>
    <div style="font-size:18px;font-weight:800;color:var(--tx);margin-bottom:16px">🏅 Adicionar prova</div>
    <div class="field" style="margin-bottom:10px"><label>Nome da corrida *</label><input type="text" id="rc-nome" placeholder="ex: São Silvestre 10km"></div>
    <div class="g2" style="margin-bottom:10px">
      <div class="field"><label>Data *</label><input type="date" id="rc-data" value="${today}"></div>
      <div class="field"><label>Distância</label>
        <select id="rc-dist">
          <option value="">Selecione</option>
          <option value="5km">5km</option><option value="10km">10km</option>
          <option value="15km">15km</option><option value="21km (Meia)">21km (Meia)</option>
          <option value="42km (Maratona)">42km (Maratona)</option>
          <option value="Trail">Trail</option><option value="Outra">Outra</option>
        </select>
      </div>
    </div>
    <div class="field" style="margin-bottom:10px"><label>Local / Cidade</label><input type="text" id="rc-local" placeholder="ex: São Paulo, SP"></div>
    <div class="field" style="margin-bottom:16px"><label>Observações</label><input type="text" id="rc-obs" placeholder="ex: Objetivo: 55 min"></div>
    <div id="rc-conflict" style="display:none;margin-bottom:10px;padding:10px 14px;background:rgba(232,54,93,.08);border-radius:var(--r);border-left:3px solid var(--red);font-size:12px;color:var(--red)"></div>
    <div id="rc-msg" style="display:none;margin-bottom:10px;padding:10px;border-radius:var(--r);font-size:12px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-neon" style="flex:1" onclick="doAddRace()">💾 Salvar prova</button>
      <button class="btn btn-ghost" style="width:auto;padding:12px 16px" onclick="this.closest('.race-form-modal').remove()">✕</button>
    </div>
  </div>`;

  // Check conflicts on date change
  modal.querySelector('#rc-data').addEventListener('change', function(){
    const v=this.value;
    if(!v) return;
    const [y,m,d]=v.split('-');
    const dataStr=d+'/'+m+'/'+y;
    const conflicts=RACES.filter(r=>r.data===dataStr);
    const conflEl=modal.querySelector('#rc-conflict');
    if(conflicts.length>0){
      conflEl.style.display='block';
      conflEl.textContent='⚠️ Conflito! Já tem prova nesta data: '+conflicts.map(r=>r.nome).join(', ');
    } else {
      conflEl.style.display='none';
    }
  });

  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  document.body.appendChild(modal);
}

async function doAddRace(){
  const nomeEl=document.getElementById('rc-nome');
  const dataEl=document.getElementById('rc-data');
  const distEl=document.getElementById('rc-dist');
  const localEl=document.getElementById('rc-local');
  const obsEl=document.getElementById('rc-obs');
  const msgEl=document.getElementById('rc-msg');

  const nome=nomeEl?.value?.trim();
  const dataISO=dataEl?.value;
  if(!nome||!dataISO){
    if(msgEl){msgEl.style.display='block';msgEl.style.background='var(--red-dim)';msgEl.style.color='var(--red)';msgEl.textContent='Preencha nome e data.';}
    return;
  }
  const [y,m,d]=dataISO.split('-');
  const data=d+'/'+m+'/'+y;

  if(msgEl){msgEl.style.display='block';msgEl.style.background='var(--teal-dim)';msgEl.style.color='var(--teal)';msgEl.textContent='Salvando...';}
  const ok=await saveRace({nome,data,distancia:distEl?.value||'',local:localEl?.value?.trim()||'',obs:obsEl?.value?.trim()||''});
  if(ok){
    document.querySelector('.race-form-modal')?.remove();
    // Jump to that month
    RACE_VIEW_DATE=new Date(y,m-1,1);
    renderCorridas();
  } else {
    if(msgEl){msgEl.textContent='Erro ao salvar. Tente novamente.';}
  }
}

async function doDeleteRace(id){
  if(!confirm('Remover esta prova?')) return;
  await deleteRace(id);
  renderCorridas();
}

// ═══════════════════════════════════════════════════
//  DELETE WORKOUT
// ═══════════════════════════════════════════════════
async function doDelete(id){
  if(!confirm('Excluir este treino?'))return;
  await deleteWorkout(id);
  renderEvolucao();
}

</script>

</body>
</html>
