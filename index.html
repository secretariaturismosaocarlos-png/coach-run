<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Run — Treinador de Corrida</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   TOKENS — CORRIDA DE RUA PALETTE
══════════════════════════════════════════════ */
:root{
  /* Brand — running palette */
  --neon:#FF5C00;         /* orange — primary action */
  --neon-dim:rgba(255,92,0,0.10);
  --orange:#0984E3;       /* blue — Z2 / tempo */
  --orange-dim:rgba(9,132,227,0.10);
  --teal:#00B894;         /* green — Z1 / easy / longão */
  --teal-dim:rgba(0,184,148,0.10);
  --red:#E8365D;          /* red — Z3 / intense */
  --red-dim:rgba(232,54,93,0.10);
  --purple:#6C5CE7;       /* purple — recovery */
  --purple-dim:rgba(108,92,231,0.10);
  /* Backgrounds — light */
  --bg:#F0F4F8;
  --bg2:#FFFFFF;
  --bg3:#F7F9FC;
  --bg4:#EDF1F6;
  /* Text */
  --tx:#1A1F2E;
  --tx2:#5F6880;
  --tx3:#A0AABF;
  /* Border */
  --bd:rgba(0,0,0,0.07);
  --bd2:rgba(0,0,0,0.14);
  /* Radius */
  --r:12px; --rl:18px; --rx:28px;
  /* Font */
  --sans:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
  /* Shadows */
  --s1:0 2px 8px rgba(0,0,0,0.06);
  --s2:0 4px 20px rgba(0,0,0,0.09);
  --s3:0 8px 32px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--tx3);border-radius:4px}

/* ══ APP SHELL ══ */
.app{max-width:720px;margin:0 auto;padding:0 0 100px}

/* ══ HEADER ══ */
.header{padding:20px 16px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;background:var(--neon);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(255,92,0,.3)}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rx);padding:6px 12px;cursor:pointer}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--neon);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(255,92,0,.3)}
.user-name{font-size:12px;font-weight:500}

/* ══ BOTTOM NAV ══ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding:6px 0 10px;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.08)}
.nav-inner{max-width:720px;margin:0 auto;display:flex;justify-content:space-around;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-inner::-webkit-scrollbar{display:none}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;border:none;background:transparent;cursor:pointer;border-radius:var(--r);transition:all .2s;min-width:60px}
.nav-btn .ni{font-size:20px;transition:transform .2s}
.nav-btn .nl{font-size:10px;font-weight:600;color:var(--tx2);transition:color .2s;letter-spacing:.3px;text-transform:uppercase}
.nav-btn.active .nl{color:var(--neon)}.nav-btn.active{background:rgba(255,92,0,.06);border-radius:12px}
.nav-btn.active .ni{transform:scale(1.15)}
.panel{display:none;padding:0 16px}.panel.active{display:block}

/* ══ CARDS ══ */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:12px;box-shadow:var(--s1,0 2px 8px rgba(0,0,0,0.06))}
.card-accent{border-color:rgba(255,92,0,.25);background:linear-gradient(135deg,var(--bg2) 0%,rgba(255,92,0,.03) 100%)}
.card-orange{border-color:rgba(9,132,227,.2);background:linear-gradient(135deg,var(--bg2) 0%,rgba(255,92,0,.03) 100%)}
.card-teal{border-color:rgba(0,184,148,.2);background:linear-gradient(135deg,var(--bg2) 0%,rgba(0,184,148,.03) 100%)}
.clabel{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);margin-bottom:12px}

/* ══ FORMS ══ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.field label{font-size:11px;font-weight:600;color:var(--tx2);display:block;margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:var(--sans);font-size:14px;outline:none;transition:all .2s;box-shadow:inset 0 1px 3px rgba(0,0,0,0.04)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(255,92,0,.6);background:#fff;box-shadow:0 0 0 3px rgba(255,92,0,.10)}
.field input::placeholder,.field textarea::placeholder{color:var(--tx3)}
.field input.ok{border-color:rgba(0,184,148,.4);background:rgba(0,184,148,.04)}
select option{background:var(--bg3)}

/* ══ BUTTONS ══ */
.btn{padding:12px 20px;border:none;border-radius:var(--r);font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.2px}
.btn-neon{background:var(--neon);color:#fff;width:100%;box-shadow:0 4px 14px rgba(255,92,0,.35)}
.btn-neon:hover{background:#e85200;transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,92,0,.45)}
.btn-orange{background:var(--orange);color:#fff;width:100%}
.btn-orange:hover{background:#ff7322}
.btn-ghost{background:var(--bg3);color:var(--tx2);border:1.5px solid var(--bd);width:100%}
.btn-ghost:hover{border-color:var(--bd2);color:var(--tx)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(232,54,93,.2)}
.btn-danger:hover{background:rgba(232,54,93,.2)}

/* ══ PILLS / BADGES ══ */
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-neon{background:var(--neon-dim);color:var(--neon)}
.badge-orange{background:var(--orange-dim);color:var(--orange)}
.badge-teal{background:var(--teal-dim);color:var(--teal)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-purple{background:var(--purple-dim);color:var(--purple)}
.badge-gray{background:rgba(255,255,255,.06);color:var(--tx2)}

/* ══ ALERTS ══ */
.alert{display:flex;gap:10px;padding:10px 14px;border-radius:var(--r);margin-bottom:8px;font-size:12px;line-height:1.6;border-left:3px solid}
.alert-neon{background:var(--neon-dim);border-color:var(--neon);color:#d4e800}
.alert-orange{background:var(--orange-dim);border-color:var(--orange);color:#ff8c44}
.alert-red{background:var(--red-dim);border-color:var(--red);color:#ff7a8a}
.alert-teal{background:var(--teal-dim);border-color:var(--teal);color:#4dfde8}

/* ══ METRICS ══ */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.metric{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 10px;text-align:center;position:relative;overflow:hidden;box-shadow:var(--s1,0 2px 8px rgba(0,0,0,0.06))}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.metric-neon::before{background:var(--neon)}
.metric-orange::before{background:var(--orange)}
.metric-teal::before{background:var(--teal)}
.mlabel{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.mval{font-family:var(--mono);font-size:22px;font-weight:700}
.msub{font-size:10px;color:var(--tx2);margin-top:2px}

/* ══ SCORE RING ══ */
.score-wrap{display:flex;align-items:center;gap:16px}
.score-ring-wrap{position:relative;width:88px;height:88px;flex-shrink:0}
.score-ring-wrap svg{transform:rotate(-90deg)}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1}
.score-lbl{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-top:1px}

/* ══ ZONE BARS ══ */
.zone-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-radius:var(--r);margin-bottom:5px;border:1px solid transparent}
.zone-label{font-size:12px;font-weight:600}
.zone-sub{font-size:10px;margin-top:1px;opacity:.7}
.zone-pace{font-family:var(--mono);font-size:12px;font-weight:700}

/* ══ PROGRESS BAR ══ */
.prog-wrap{margin:10px 0}
.prog-header{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
.prog-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .9s cubic-bezier(.4,0,.2,1)}

/* ══ STEPS (WORKOUT) ══ */
.step-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)}
.step-row:last-child{border-bottom:none}
.step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px}
.sdL{background:var(--neon-dim);color:var(--neon);border:1px solid rgba(255,92,0,.25)}
.sdM{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(9,132,227,.2)}
.sdF{background:var(--red-dim);color:var(--red);border:1px solid rgba(232,54,93,.2)}
.step-title{font-size:13px;font-weight:600;margin-bottom:2px}
.step-desc{font-size:11px;color:var(--tx2);line-height:1.5}
.step-pace{font-family:var(--mono);font-size:11px;color:var(--neon);margin-top:2px}

/* ══ PLAN CARD ══ */
.plan-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:8px;position:relative;overflow:hidden;box-shadow:var(--s1,0 2px 6px rgba(0,0,0,0.05))}
.plan-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.plan-easy::before{background:var(--neon)}
.plan-mod::before{background:var(--orange)}
.plan-hard::before{background:var(--red)}
.plan-long::before{background:var(--teal)}
.plan-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.plan-day{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.plan-title{font-size:14px;font-weight:700}
.plan-obj{font-size:11px;color:var(--tx2);margin-bottom:8px;line-height:1.5}
.plan-body{font-size:12px;background:var(--bg4);padding:8px 10px;border-radius:var(--r);line-height:1.7;color:var(--tx)}

/* ══ EVOLUTION CHART BARS ══ */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-date{font-size:10px;color:var(--tx3);width:44px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.bar-bg{flex:1;background:var(--bg3);border-radius:3px;height:24px;overflow:hidden;border:1px solid var(--bd)}
.bar-fill{height:100%;border-radius:2px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;font-family:var(--mono);transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ══ HISTORY TABLE ══ */
.htable{width:100%;font-size:12px;border-collapse:collapse}
.htable th{text-align:left;padding:6px 8px;color:var(--tx3);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--bd)}
.htable td{padding:8px 8px;border-bottom:1px solid var(--bd);vertical-align:middle}
.htable tr:last-child td{border-bottom:none}
.htable tr:hover td{background:rgba(255,255,255,.02)}
.del-btn{background:var(--bg3);border:1.5px solid var(--bd);cursor:pointer;color:var(--tx3);font-size:12px;padding:4px 10px;border-radius:8px;transition:all .15s;font-family:var(--sans)}
.del-btn:hover{color:var(--red);background:var(--red-dim);border-color:rgba(232,54,93,.3)}
.tr-up{color:var(--neon);font-weight:700}.tr-dn{color:var(--red);font-weight:700}.tr-ne{color:var(--orange);font-weight:700}

/* ══ EVO STATS ══ */
.evo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.evo-stat{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center;position:relative;overflow:hidden;box-shadow:var(--s1,0 2px 6px rgba(0,0,0,0.05))}
.evo-stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.esl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.esv{font-family:var(--mono);font-size:18px;font-weight:700}
.esd{font-size:10px;margin-top:2px;color:var(--tx2)}

/* ══ GOAL BOX ══ */
.goal-box{border-radius:var(--rl);padding:16px;margin-bottom:12px;border:1px solid}
.gb-neon{background:var(--neon-dim);border-color:rgba(255,92,0,.25)}
.gb-orange{background:var(--orange-dim);border-color:rgba(9,132,227,.2)}
.gb-teal{background:var(--teal-dim);border-color:rgba(0,184,148,.2)}
.grow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:13px}
.grow:last-child{border-bottom:none}
.gkey{color:var(--tx2);font-size:12px}
.gval{font-family:var(--mono);font-weight:700}

/* ══ UPLOAD ══ */
.upload-zone{border:2px dashed rgba(255,92,0,.25);border-radius:var(--rl);padding:24px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--neon-dim);position:relative;margin-bottom:12px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--neon);background:rgba(255,92,0,.15)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.utype{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;background:var(--bg3);color:var(--tx2);border:1px solid var(--bd);margin:2px}

/* ══ OBJ GRID ══ */
.obj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.obj-card{background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .2s;position:relative;box-shadow:var(--s1,0 2px 6px rgba(0,0,0,0.05))}
.obj-card:hover{border-color:rgba(255,92,0,.3);transform:translateY(-1px)}
.obj-card.sel{border-color:var(--neon);background:var(--neon-dim);box-shadow:0 0 20px rgba(255,92,0,.08)}
.obj-card.sel::after{content:'✓';position:absolute;top:8px;right:10px;font-size:12px;color:var(--neon);font-weight:700}
.oi{font-size:18px;margin-bottom:5px}
.ot{font-size:12px;font-weight:700;margin-bottom:2px;line-height:1.3}
.os{font-size:10px;color:var(--tx2)}

/* ══ DIVIDER ══ */
.divider{height:1px;background:var(--bd);margin:12px 0}
.or-div{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--tx3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ══ EMPTY ══ */
.empty{text-align:center;padding:50px 24px;color:var(--tx3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--tx2)}
.empty-sub{font-size:12px;line-height:1.6}

/* ══ AUTH SCREENS ══ */
#screen-auth{position:fixed;inset:0;background:linear-gradient(135deg,#fff8f5 0%,#f0f4f8 100%);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-icon{width:70px;height:70px;background:var(--neon);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 14px;box-shadow:0 8px 24px rgba(255,92,0,.35)}
.auth-title{font-size:28px;font-weight:700;letter-spacing:-.5px}
.auth-sub{font-size:14px;color:var(--tx2);margin-top:4px}
.auth-form{background:#fff;border:1px solid var(--bd);border-radius:var(--rx);padding:24px;box-shadow:var(--s3,0 8px 32px rgba(0,0,0,0.12))}
.auth-tab-wrap{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:20px;gap:3px}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--tx2);font-family:var(--sans);font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--bg2);color:var(--tx)}
.auth-msg{margin-top:12px;padding:10px 14px;border-radius:var(--r);font-size:12px;line-height:1.5;display:none}

/* ══ PENDING SCREEN ══ */
#screen-pending{position:fixed;inset:0;background:var(--bg);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;text-align:center}
.pending-box{max-width:360px}

/* ══ ADMIN PANEL ══ */
.admin-user-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd);gap:10px}
.admin-user-row:last-child{border-bottom:none}
.admin-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;border:1px solid var(--bd)}
.admin-info{flex:1;min-width:0}
.admin-email{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-meta{font-size:11px;color:var(--tx2);margin-top:1px}
.admin-actions{display:flex;gap:6px;flex-shrink:0}
.admin-btn{padding:5px 12px;border:1px solid var(--bd);border-radius:var(--r);background:transparent;color:var(--tx2);font-family:var(--sans);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.admin-btn.approve{border-color:rgba(255,92,0,.3);color:var(--neon)}
.admin-btn.approve:hover{background:var(--neon-dim)}
.admin-btn.block{border-color:rgba(232,54,93,.3);color:var(--red)}
.admin-btn.block:hover{background:var(--red-dim)}
.admin-btn.unblock{border-color:rgba(0,184,148,.3);color:var(--teal)}
.admin-btn.unblock:hover{background:var(--teal-dim)}

/* ══ ONBOARDING ══ */
.ob-step{display:none}.ob-step.active{display:block}
.ob-progress{display:flex;gap:6px;margin-bottom:20px}
.ob-pip{height:4px;flex:1;border-radius:2px;background:var(--bg3);transition:background .3s}
.ob-pip.done{background:var(--neon)}
.ob-heading{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.ob-sub{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:18px}

/* ══ SYNC DOT ══ */
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.sdg{background:var(--neon)}.sda{background:var(--orange)}.sdx{background:var(--tx3)}.sdb{background:var(--teal);animation:sdp 1s linear infinite}
@keyframes sdp{0%,100%{opacity:1}50%{opacity:.2}}

/* ══ RESPONSIVE ══ */
@media(max-width:600px){
  .g3{grid-template-columns:1fr 1fr}
  .metrics{grid-template-columns:1fr 1fr}
  .obj-grid{grid-template-columns:1fr}
  .evo-grid{grid-template-columns:1fr 1fr}
  .admin-actions{flex-direction:column}
  /* Race calendar stacks on mobile */
  .race-cal-grid{grid-template-columns:1fr !important}
}

/* ══ PLAN SPREADSHEET ══ */

.ps-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}

.ia-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px}
.ia-pulse{width:48px;height:48px;border-radius:50%;border:3px solid var(--neon-dim);border-top-color:var(--neon);animation:spin .8s linear infinite}

/* ══ API SETTINGS MODAL ══ */

function authSwitchTab(t){
  document.getElementById('auth-login').style.display    = t==='login'    ? 'block' : 'none';
  document.getElementById('auth-register').style.display = t==='register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((el,i)=>el.classList.toggle('active',[`login`,'register'][i]===t));
  hideAuthMsg();
}

function showAuthMsg(msg, type='error'){
  const el=document.getElementById('auth-msg');
  el.style.display='block';
  el.style.background = type==='ok' ? 'rgba(0,184,148,.1)' : 'rgba(232,54,93,.1)';
  el.style.color       = type==='ok' ? 'var(--teal)' : 'var(--red)';
  el.style.border      = `1px solid ${type==='ok' ? 'rgba(0,184,148,.3)' : 'rgba(232,54,93,.3)'}`;
  el.textContent = msg;
}
function hideAuthMsg(){ document.getElementById('auth-msg').style.display='none'; }

function togglePass(id,btn){const el=document.getElementById(id);if(el.type==='password'){el.type='text';btn.textContent='🙈';}else{el.type='password';btn.textContent='👁';}}

async function doForgotPass(){
  const email=document.getElementById('l-email').value.trim();
  if(!email){showAuthMsg('Digite seu e-mail acima primeiro.');return;}
  showAuthMsg('Enviando link...','ok');
  const {error}=await db.auth.resetPasswordForEmail(email,{redirectTo:'https://secretariaturismosaocarlos-png.github.io/coach-run/'});
  if(error)showAuthMsg('Erro: '+error.message);
  else showAuthMsg('✓ Link enviado para '+email+'. Verifique sua caixa de entrada.','ok');
}

async function doLogin(){
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  if(!email||!pass){ showAuthMsg('Preencha e-mail e senha.'); return; }
  showAuthMsg('Entrando...','ok');
  const {data, error} = await db.auth.signInWithPassword({email, password:pass});
  if(error){
    if(error.message==='Invalid login credentials') showAuthMsg('E-mail ou senha incorretos.');
    else if(error.message.includes('Email not confirmed')) showAuthMsg('E-mail não confirmado. Use o link mágico enviado ao seu e-mail, ou contate a administradora.');
    else showAuthMsg(error.message);
    return;
  }
  if(data?.user){
    CU = data.user;
    await loadUserProfile();
  }
}

async function doRegister(){
  const name  = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value;
  if(!name||!email||!pass){ showAuthMsg('Preencha todos os campos.'); return; }
  if(pass.length<6){ showAuthMsg('Senha deve ter no mínimo 6 caracteres.'); return; }
  showAuthMsg('Criando conta...','ok');
  const {data, error} = await db.auth.signUp({email, password:pass, options:{data:{name}}});
  if(error){ showAuthMsg(error.message); return; }
  if(data?.user){
    try {
      await db.from('profiles').insert({id:data.user.id, email, name, status:'pending', is_admin:false});
    } catch(e) { /* profile may already exist */ }
  }
  showAuthMsg('✓ Conta criada! Aguarde a aprovação da administradora para acessar.','ok');
}

function doLogout(){
  if(!confirm('Sair da conta?')) return;
  db.auth.signOut();
}

// Auth state listener
db.auth.onAuthStateChange(async (event, session)=>{
  if(event === 'SIGNED_OUT'){
    CU = null; PROFILE = null;
    showScreen('auth');
  }
  // INITIAL_SESSION handles page reload with existing session
  if(event === 'INITIAL_SESSION' && session?.user){
    CU = session.user;
    await loadUserProfile();
  }
});

async function loadUserProfile(){
  try {
    const {data} = await db.from('profiles').select('*').eq('id', CU.id).single();
    // Admin always gets through
    if(CU.email === ADMIN_EMAIL){
      PROFILE = data || {id:CU.id,email:CU.email,name:'Admin',status:'approved',is_admin:true};
      IS_ADMIN = true;
      showScreen('app'); await loadData(); setupUI(); renderHome(); return;
    }
    PROFILE = data; IS_ADMIN = data?.is_admin||false;
    if(!PROFILE||PROFILE.status==='pending'){showScreen('pending');return;}
    if(PROFILE.status==='blocked'){showScreen('pending');return;}
    showScreen('app'); await loadData(); setupUI(); renderHome();
  } catch(e) {
    if(CU.email===ADMIN_EMAIL){
      PROFILE={id:CU.id,email:CU.email,name:'Admin',status:'approved',is_admin:true};
      IS_ADMIN=true; showScreen('app'); await loadData(); setupUI(); renderHome();
    } else { showScreen('pending'); }
  }
}

function showScreen(s){
  document.getElementById('screen-auth').style.display    = s==='auth'    ? 'flex'  : 'none';
  document.getElementById('screen-pending').style.display = s==='pending' ? 'flex'  : 'none';
  document.getElementById('screen-app').style.display     = s==='app'     ? 'block' : 'none';
}

function setupUI(){
  const name=PROFILE?.name||CU.email.split('@')[0];
  document.getElementById('user-name-display').textContent=name.split(' ')[0];
  document.getElementById('user-avatar').textContent=name[0].toUpperCase();
  if(IS_ADMIN){document.getElementById('nb-admin').style.display='flex';checkPendingUsers();}
}
async function checkPendingUsers(){
  try{
    const {data}=await db.from('profiles').select('id').eq('status','pending');
    const n=data?data.length:0;
    const b=document.getElementById('admin-badge');
    if(b){
      b.style.display=n>0?'block':'none';
      b.textContent=n;
      if(n>(window._lastPending||0))playNotif();
      window._lastPending=n;
    }
    setTimeout(checkPendingUsers,30000);
  }catch(e){}
}
function playNotif(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [880,1100].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+i*.15);
      g.gain.linearRampToValueAtTime(.3,ctx.currentTime+i*.15+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.15+.25);
      o.start(ctx.currentTime+i*.15);o.stop(ctx.currentTime+i*.15+.25);
    });
  }catch(e){}
}

async function loadData(){
  const {data:workouts} = await db.from('workouts').select('*').eq('user_id', CU.id).order('created_at');
  HIST = (workouts||[]).map(w=>({...w, paceSec:ps(w.pace)}));
  const {data:prof} = await db.from('user_goals').select('*').eq('user_id', CU.id).single();
  await loadRaces();
  // Load previously generated plan
  try{
    const savedPlan = localStorage.getItem('cr_plan_'+CU?.id);
    if(savedPlan){ const p=JSON.parse(savedPlan); window._iaPlano=p.plan; window._defaultPlan=p.plan; }
  }catch(e){}
  if(prof){
    USER_GOAL = prof;
    // Restore selected days for onboarding
    if(prof.tempo_treino) OB_TEMPO_TREINO=prof.tempo_treino;
    if(prof.tempo_longao!==undefined) OB_TEMPO_LONGAO=prof.tempo_longao;
    if(prof.dias_selecionados && prof.dias_selecionados.length>0){
      OB_DIAS_SELECIONADOS=prof.dias_selecionados;
      OB_DIAS=prof.dias_selecionados.length;
    }
  }
}

async function loadAdminPanel(){
  const {data:users} = await db.from('profiles').select('*').order('created_at');
  const el = document.getElementById('pn-admin');
  if(!users||!users.length){el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">Nenhum usuário</div></div>';return;}

  const pending   = users.filter(u=>u.status==='pending');
  const approved  = users.filter(u=>u.status==='approved'&&!u.is_admin);
  const blocked   = users.filter(u=>u.status==='blocked');

  let html = `<div style="padding-top:8px;margin-bottom:4px">
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">⚙️ Painel Admin</div>
    <div style="font-size:12px;color:var(--tx2)">Gerencie os acessos dos usuários</div>
  </div>`;

  if(pending.length){
    html+=`<div class="card card-orange" style="margin-top:12px">
      <div class="clabel">⏳ Aguardando aprovação (${pending.length})</div>`;
    pending.forEach(u=>{ html+=adminUserRow(u); });
    html+='</div>';
  }
  if(approved.length){
    html+=`<div class="card" style="margin-top:4px">
      <div class="clabel">✅ Aprovados (${approved.length})</div>`;
    approved.forEach(u=>{ html+=adminUserRow(u); });
    html+='</div>';
  }
  if(blocked.length){
    html+=`<div class="card" style="margin-top:4px">
      <div class="clabel">🚫 Bloqueados (${blocked.length})</div>`;
    blocked.forEach(u=>{ html+=adminUserRow(u); });
    html+='</div>';
  }
  el.innerHTML=html;
}

function adminUserRow(u){
  const date = u.created_at ? new Date(u.created_at).toLocaleDateString('pt-BR') : '—';
  let actions='';
  if(u.status==='pending')  actions=`<button class="admin-btn approve" onclick="setUserStatus('${u.id}','approved')">✓ Aprovar</button>`;
  if(u.status==='approved') actions=`<button class="admin-btn block"   onclick="setUserStatus('${u.id}','blocked')">✕ Bloquear</button>`;
  if(u.status==='blocked')  actions=`<button class="admin-btn unblock" onclick="setUserStatus('${u.id}','approved')">↺ Reativar</button>`;
  return `<div class="admin-user-row">
    <div class="admin-avatar">${(u.name||u.email||'?')[0].toUpperCase()}</div>
    <div class="admin-info">
      <div class="admin-email">${u.name||'—'}</div>
      <div class="admin-meta">${u.email} · ${date}</div>
    </div>
    <div class="admin-actions">${actions}</div>
  </div>`;
}

  await db.from('profiles').update({status}).eq('id',uid);
  loadAdminPanel();
}

function previewZones(testTime, fcmax){
  const z = calcZonesFromTest(testTime, fcmax);
  if(!z) return '<div style="font-size:12px;color:var(--tx2)">Tempo inválido.</div>';
  return Object.values(z).map(zv=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;border-radius:6px;margin-bottom:3px;background:${zv.bg}">
      <span style="font-size:12px;font-weight:600;color:${zv.color}">${zv.emoji} ${zv.label}</span>
      <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${zv.color}">${sp(zv.min)}–${sp(zv.max)}</span>
    </div>`
  ).join('');
}

function calcZonesFromTest(testTime, fcmax){
  const secs = t2s(testTime);
  if(!secs || secs < 600 || secs > 2400) return null;

  // VAM = Velocidade Aeróbica Máxima (pace no teste de 3km)
  const vam_ms   = 3000 / secs;
  const vam_pace = Math.round(1000 / vam_ms); // sec/km at VO2max

  // ── ZONAS BASEADAS EM VAM (modelo Seiler + Stöggl & Sperlich) ──
  // Z1 Base:     65–75% VAM  → conversa normal, maioria dos treinos (80%)
  // Z1+ Leve:    76–82% VAM  → longão confortável
  // Z2 Limiar:   83–88% VAM  → "comfortably hard", 20min+, lactate threshold
  // Z3 VO2max:   95–105% VAM → intervalado curto, máx 10-15min acumulados
  // Z3+ Sprint:  106%+ VAM   → strides, tiros 60-200m

  // Se o atleta já tem treinos, refinar pelo pace real observado
  let refPace = vam_pace;
  if(typeof HIST !== 'undefined' && HIST && HIST.length >= 3){
    // Usar mediana dos últimos 5 treinos como ancora
    const recent = HIST.slice(-5).filter(w => w.paceSec > 120 && w.paceSec < 900);
    if(recent.length >= 2){
      const sorted = recent.map(w=>w.paceSec).sort((a,b)=>a-b);
      const median = sorted[Math.floor(sorted.length/2)];
      // Usar o mais rápido entre VAM e pace real (evita zonas abaixo do nível atual)
      refPace = Math.min(vam_pace, median);
    }
  }

  // FC zones se disponível
  const fcZones = fcmax > 0 ? {
    z1max: Math.round(fcmax * 0.75),
    z1min: Math.round(fcmax * 0.65),
    z2max: Math.round(fcmax * 0.87),
    z2min: Math.round(fcmax * 0.76),
    z3min: Math.round(fcmax * 0.88),
  } : null;

  const fcLabel = (zname) => {
    if(!fcZones) return '';
    if(zname==='z1') return ` · FC ${fcZones.z1min}–${fcZones.z1max} bpm`;
    if(zname==='z2') return ` · FC ${fcZones.z2min}–${fcZones.z2max} bpm`;
    if(zname==='z3') return ` · FC ${fcZones.z3min}–${fcmax} bpm`;
    return '';
  };

  return {
    e: {
      min: Math.round(refPace * 1.12), max: Math.round(refPace * 1.28),
      label: 'Z1 — Base aeróbica', emoji: '🟢',
      desc: `Conversa normal. 80% dos treinos.${fcLabel('z1')}`,
      color: 'var(--teal)', bg: 'var(--teal-dim)',
      pct: '65–75% VAM'
    },
    m: {
      min: Math.round(refPace * 1.04), max: Math.round(refPace * 1.11),
      label: 'Z1+ — Leve/Longão', emoji: '🔵',
      desc: `Fala frases curtas. Longões e recuperação ativa.`,
      color: '#4da6ff', bg: 'rgba(77,166,255,.08)',
      pct: '76–82% VAM'
    },
    t: {
      min: Math.round(refPace * 0.94), max: Math.round(refPace * 1.03),
      label: 'Z2 — Limiar láctico', emoji: '🟡',
      desc: `Difícil mas sustentável 20min+. "Comfortably hard".${fcLabel('z2')}`,
      color: 'var(--orange)', bg: 'var(--orange-dim)',
      pct: '83–88% VAM'
    },
    i: {
      min: Math.round(refPace * 0.86), max: Math.round(refPace * 0.93),
      label: 'Z3 — Intervalo VO2max', emoji: '🔴',
      desc: `Muito difícil. Máx 10–15 min acumulados.${fcLabel('z3')}`,
      color: 'var(--red)', bg: 'var(--red-dim)',
      pct: '95–105% VAM'
    },
    r: {
      min: Math.round(refPace * 0.78), max: Math.round(refPace * 0.85),
      label: 'Z3+ — Sprint/Strides', emoji: '💀',
      desc: 'Tiros 60–200m em subida. Máximo esforço.',
      color: 'var(--purple)', bg: 'var(--purple-dim)',
      pct: '106%+ VAM'
    },
    _vam: {
      ms: vam_ms,
      kmh: Math.round(vam_ms * 3.6 * 10)/10,
      pace: vam_pace,
      refPace,
      fcmax: fcmax||0,
      fcZones
    }
  };
}


function buildHumanAnalysis(last, basePace, evoSt, evoMag, obj, n, h){
  const pace = last.pace;
  const dist = last.dist;
  const tempo = last.tempo;

  // Classify effort in human terms
  let esforcoLabel, esforcoDesc, esforcoEmoji;
  if(basePace > 480){ // > 8min/km
    esforcoLabel='Trote leve / caminhada acelerada';
    esforcoDesc='Um ritmo bem confortável. Você provavelmente conseguia conversar normalmente durante o treino.';
    esforcoEmoji='😌';
  } else if(basePace > 390){ // 6:30–8:00
    esforcoLabel='Corrida leve';
    esforcoDesc='Um ritmo tranquilo de corrida. Conseguia falar frases curtas, mas não conversar à vontade.';
    esforcoEmoji='🟢';
  } else if(basePace > 330){ // 5:30–6:30
    esforcoLabel='Corrida moderada';
    esforcoDesc='Ritmo médio — exige esforço, mas dá pra manter por bastante tempo.';
    esforcoEmoji='🟡';
  } else if(basePace > 270){ // 4:30–5:30
    esforcoLabel='Corrida forte';
    esforcoDesc='Ritmo forte — difícil de manter por muito tempo. Bom para treinos específicos.';
    esforcoEmoji='🔴';
  } else {
    esforcoLabel='Ritmo de competição';
    esforcoDesc='Ritmo muito forte. Só sustentável por distâncias curtas.';
    esforcoEmoji='💀';
  }

  // What went well
  const pontosBons = [];
  pontosBons.push({
    titulo: 'Você treinou! 👏',
    texto: `${dist}km em ${tempo||'—'} é um ótimo trabalho. O maior passo é sair de casa — você fez isso.`,
    dica: 'Consistência semana a semana é o que transforma iniciantes em corredores.'
  });

  if(basePace > 420){
    pontosBons.push({
      titulo: 'Ritmo confortável ✅',
      texto: 'Correr no ritmo certo (sem se matar) é a coisa mais importante para quem está começando.',
      dica: 'Esse ritmo leve ajuda o corpo a se adaptar, evita lesões e constrói a base que você vai precisar depois.'
    });
  }

  if(dist >= 4){
    pontosBons.push({
      titulo: `Boa distância — ${dist}km! 📏`,
      texto: 'Para o seu objetivo, o tempo em movimento importa mais que a velocidade nesse momento.',
      dica: 'Seu corpo está aprendendo a ser eficiente. Continue aumentando a distância aos poucos.'
    });
  }

  if(last.fcmed > 0 && last.fcmed < 155){
    pontosBons.push({
      titulo: 'Coração trabalhando bem 💚',
      texto: `Frequência cardíaca de ${last.fcmed} bpm é ótima para esse ritmo.`,
      dica: 'Isso mostra que você está na zona certa de esforço — nem fácil demais, nem pesado demais.'
    });
  }

  if(evoSt === 'evolucao'){
    pontosBons.push({
      titulo: 'Você está evoluindo! 📈',
      texto: `Seu ritmo melhorou ${sp(Math.abs(evoMag))}/km em relação aos últimos treinos.`,
      dica: 'O treino está funcionando. Mantenha a frequência e os resultados vão continuar aparecendo.'
    });
  }

  // What to improve
  const melhorar = [];

  if(basePace > 480){
    melhorar.push({
      titulo: 'Inclua trechos de corrida contínua 🏃',
      problema: 'No ritmo atual, seu corpo não está sendo estimulado o suficiente para evoluir na corrida.',
      solucao: 'No próximo treino, tente: 2 minutos correndo + 2 minutos caminhando, repetindo por 20–30 min. A cada semana, aumente 1 minuto na corrida.',
      icon: '💡'
    });
  }

  if(evoSt === 'regressao'){
    melhorar.push({
      titulo: 'Seu ritmo piorou um pouco ⚠️',
      problema: `Comparado com os treinos anteriores, você correu ${sp(Math.abs(evoMag))}/km mais devagar.`,
      solucao: 'Isso é normal e acontece com todo mundo! Pode ser cansaço, sono ruim ou estresse. Descanse bem, beba água e não force essa semana.',
      icon: '😴'
    });
  }

  if(last.cad > 0 && last.cad < 165){
    melhorar.push({
      titulo: 'Experimente dar passos mais curtos e rápidos 👣',
      problema: `Você está dando passos longos (${last.cad} passos por minuto). Passos muito longos forçam mais os joelhos.`,
      solucao: 'Pense em "pisar leve, como se o chão estivesse quente". Passos curtos e rápidos são mais econômicos e reduzem muito o risco de lesão. Não precisa de sensor — só preste atenção.',
      icon: '💡'
    });
  }

  if(last.splits && last.splits.length > 2){
    const sv = last.splits.map(ps);
    const maxS = Math.max(...sv), minS = Math.min(...sv);
    const diff = maxS - minS;
    if(diff > 60){
      melhorar.push({
        titulo: 'Saia mais devagar no começo 🐢➡️🐇',
        problema: `Sua velocidade variou muito — ${sp(minS)}/km no mais rápido e ${sp(maxS)}/km no mais lento. Provavelmente saiu muito rápido e foi diminuindo.`,
        solucao: 'Na próxima corrida: saia mais devagar do que acha que deveria. Nos últimos km, acelere. Esse é o segredo dos corredores experientes.',
        icon: '🎯'
      });
    }
  }

  if(melhorar.length === 0){
    melhorar.push({
      titulo: 'Aumente a distância gradualmente 📈',
      problema: 'Para continuar evoluindo, o corpo precisa de novos estímulos.',
      solucao: `Na próxima semana, tente correr mais ${Math.round(dist * 0.1 * 10) / 10}km do que hoje. Nunca aumente mais de 10% por semana — isso protege seus joelhos e tornozelos.`,
      icon: '💡'
    });
  }

  // Main coaching message
  const coachMsg = getCoachMsg(obj, evoSt, basePace, dist, n);

  return { esforcoLabel, esforcoDesc, esforcoEmoji, pontosBons, melhorar, coachMsg };
}

function getCoachMsg(obj, evoSt, basePace, dist, n){
  const msgs = {
    'primeiro5k': n < 3
      ? 'Você está nos primeiros passos! O objetivo agora é criar o hábito. Não se preocupe com velocidade — foque em aparecer para treinar 3x por semana.'
      : `Você já tem ${n} treinos! Continue assim. Quando conseguir correr 20 minutos sem parar, o 5km vai estar bem perto.`,
    'primeiro10k': `Para chegar nos 10km, o segredo é aumentar a distância devagar — máximo 10% por semana. O treino mais importante é o "treino longo" do final de semana. Sem pressa!`,
    'primeiro15k': `15km é uma ótima meta! Você vai chegar lá aumentando seu treino longo gradualmente. Quando os 10km ficarem confortáveis, os 15km virão naturalmente.`,
    'melhorar5k': `Para melhorar o 5km, você precisa treinar em ritmos diferentes. Não só correr "normal" — inclua momentos mais rápidos e momentos de recuperação. O plano vai te guiar.`,
    'melhorar10k': `Para bater seu tempo no 10km, 80% dos seus treinos devem ser leves (parece fácil demais, mas funciona!) e 20% fortes. Isso é o que os melhores corredores fazem.`,
    'meia': `Meia maratona é um objetivo incrível! O treino longo semanal é o coração do plano. Durma bem — é dormindo que o corpo se adapta.`,
    'maratona': `Maratona é uma jornada longa. Consistência supera intensidade — apareça para treinar toda semana, mesmo que devagar.`,
    'emagrecimento': `Para emagrecer com corrida, o segredo não é correr rápido — é correr por mais tempo, em ritmo confortável. Quanto mais tempo você passa se movendo, mais calorias queima.`,
    'condicionamento': `Correr regularmente em ritmo confortável é uma das melhores coisas que você pode fazer pela saúde. Você está no caminho certo!`,
    'volta': `Voltar a correr depois de uma pausa exige paciência. Seu fôlego volta rápido, mas músculos e articulações precisam de mais tempo. Comece devagar e aumente gradualmente.`,
    'trail10k': `Trail é divertido e desafiador! Em subidas, caminhe rápido — é mais econômico que correr. Nas descidas, passos curtos e rápidos para proteger os joelhos.`,
    'velocidade': `Para ficar mais rápido, paradoxalmente você precisa correr mais devagar na maioria dos treinos. Reserve apenas 1-2 dias por semana para treinos fortes.`,
  };
  let msg = msgs[obj.id] || 'Continue treinando com consistência — é o que faz a diferença no longo prazo.';
  if(evoSt === 'evolucao') msg += ' 🔥 Você está evoluindo — continue!';
  if(evoSt === 'regressao') msg += ' Descanse bem essa semana antes de retomar.';
  return msg;
}

function renderTestAnalise(el, a){
  const z = a.z;
  const vam = z._vam || {};
  const tg = USER_GOAL;
  const tp = a.tp;
  const obj = a.obj;

  // Zone display
  const zonesHtml = Object.values(z).filter(zv=>zv.label).map(zv=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:var(--r);margin-bottom:6px;background:${zv.bg};border:1px solid ${zv.bg.replace('.10)','.25)')}"
      ">
      <div>
        <div style="font-size:13px;font-weight:700;color:${zv.color}">${zv.emoji} ${zv.label}</div>
        <div style="font-size:11px;color:var(--tx2);margin-top:2px">${zv.desc}</div>
        ${zv.pct?`<div style="font-size:10px;color:var(--tx3);margin-top:1px">${zv.pct} da VAM</div>`:''}
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:${zv.color}">${sp(zv.min)}–${sp(zv.max)}</div>
        <div style="font-size:10px;color:var(--tx3)">min/km</div>
      </div>
    </div>`).join('');

  // Splits analysis
  const splits = tg.test_splits || [];
  let splitsHtml = '';
  if(splits.length >= 2){
    const sv = splits.map(s=>t2s(s));
    const mn = Math.min(...sv), mx = Math.max(...sv);
    const diff = mx - mn;
    const trend = sv[sv.length-1] < sv[0] ? '📈 Negativo split — acelerou no final' :
                  diff > 30 ? '⚠️ Pacing irregular — saiu rápido e desacelerou' :
                  '✅ Pacing uniforme e controlado';
    splitsHtml = `<div class="card" style="margin-bottom:12px">
      <div class="clabel">⏱ Splits do teste</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        ${splits.map((s,i)=>{
          const v=t2s(s);
          const col=v===mn?'var(--teal)':v===mx?'var(--red)':'var(--tx2)';
          return `<div style="padding:6px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--bd);font-family:var(--mono);font-size:12px;font-weight:700;color:${col}">km${i+1} ${s}</div>`;
        }).join('')}
      </div>
      <div style="font-size:12px;color:var(--tx2)">${trend}</div>
    </div>`;
  }

  // Effort analysis from FC
  let fcAnalysis = '';
  if(tg.test_fcmax > 0 && tg.test_fcmed > 0){
    const pct = Math.round(tg.test_fcmed / tg.test_fcmax * 100);
    const effortLabel = pct >= 95 ? 'Esforço máximo — teste bem executado ✅' :
                        pct >= 88 ? 'Esforço alto — bom teste' :
                        'Esforço moderado — pode ter potencial maior';
    fcAnalysis = `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r);background:rgba(232,54,93,.06);border:1px solid rgba(232,54,93,.15);margin-bottom:8px">
      <div style="font-size:24px;font-weight:800;font-family:var(--mono);color:var(--red)">${pct}%</div>
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--red)">${effortLabel}</div>
        <div style="font-size:11px;color:var(--tx2)">FC média ${tg.test_fcmed} bpm de ${tg.test_fcmax} bpm máx</div>
      </div>
    </div>`;
  }

  // Race estimate using Riegel
  let raceEst = '';
  if(tg.test_time && obj.dist > 0){
    const testSec = t2s(tg.test_time);
    const testDist = tg.test_dist || 3;
    const est = testSec * Math.pow(obj.dist / testDist, 1.06);
    raceEst = s2t(Math.round(est));
  }

  el.innerHTML = `<div style="padding-top:8px">

    <div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--neon);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">📐 Análise do Teste de Calibração</div>
      <div style="font-size:22px;font-weight:800;color:var(--tx)">Suas zonas de treino</div>
      <div style="font-size:13px;color:var(--tx2);margin-top:2px">Baseadas no seu teste de ${tg.test_dist||3}km em ${tg.test_time}</div>
    </div>

    <!-- Key metrics from test -->
    <div class="metrics" style="margin-bottom:12px">
      <div class="metric metric-neon">
        <div class="mlabel">Pace no teste</div>
        <div class="mval" style="color:var(--neon)">${tg.test_time?(()=>{const s=t2s(tg.test_time);return sp(Math.round(s/(tg.test_dist||3)))})():'—'}</div>
        <div class="msub">min/km</div>
      </div>
      <div class="metric metric-orange">
        <div class="mlabel">VAM</div>
        <div class="mval" style="color:var(--orange)">${vam.kmh||'—'}</div>
        <div class="msub">km/h</div>
      </div>
      <div class="metric metric-teal">
        <div class="mlabel">Estimativa ${obj.dist}km</div>
        <div class="mval" style="font-size:16px;color:var(--teal)">${raceEst||'—'}</div>
        <div class="msub">tempo estimado</div>
      </div>
    </div>

    <!-- FC effort -->
    ${fcAnalysis}

    <!-- Splits -->
    ${splitsHtml}

    <!-- Target -->
    ${tp>0?`<div class="card card-accent" style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px">🎯 ${obj.t}</div>
      <div class="grow"><span class="gkey">Seu pace atual</span><span class="gval">${sp(a.basePace)}/km</span></div>
      <div class="grow"><span class="gkey">Pace alvo</span><span class="gval" style="color:var(--neon)">${sp(tp)}/km</span></div>
      <div class="grow"><span class="gkey">Diferença a reduzir</span><span class="gval">${sp(Math.max(0,a.basePace-tp))}/km</span></div>
      <div class="grow"><span class="gkey">Prazo estimado</span><span class="gval" style="color:var(--orange)">${a.weeksETA} semanas (até ${a.etaDate})</span></div>
    </div>`:''}

    <!-- Zones -->
    <div class="card" style="margin-bottom:12px">
      <div class="clabel">🏃 Zonas de treinamento calibradas</div>
      <div style="font-size:11px;color:var(--tx2);margin-bottom:10px">Use esses ritmos em todos os treinos do plano. As zonas serão refinadas conforme você treina.</div>
      ${zonesHtml}
    </div>

    <!-- Next steps -->
    <div class="card card-teal">
      <div class="clabel">✅ Próximos passos</div>
      <div style="font-size:13px;line-height:1.8;color:var(--tx)">
        1. Acesse <strong>📅 Plano</strong> → <strong>Gerar Plano IA</strong> para seu plano personalizado de 4 semanas<br>
        2. Execute os treinos respeitando as zonas acima<br>
        3. Insira cada treino no app — a análise vai comparar com o plano e orientar os ajustes<br>
        4. As zonas serão refinadas automaticamente conforme seu desempenho real
      </div>
    </div>

  </div>`;
}

function renderAnalise(){
  const a=computeAnalise();const el=document.getElementById('pn-analise');
  if(!a){el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Sem dados</div><div class="empty-sub">Adicione treinos para ver a análise.</div></div>`;return;}

  // ── SPECIAL: if only 1 workout and test exists, show test analysis first ──
  if(HIST.length===1 && USER_GOAL?.test_time){
    renderTestAnalise(el, a);
    return;
  }

  const sc=a.score>=90?{c:'var(--neon)',l:'EXCELENTE'}:a.score>=70?{c:'var(--teal)',l:'BOM'}:a.score>=50?{c:'var(--orange)',l:'ATENÇÃO'}:{c:'var(--red)',l:'REVISAR'};
  const ecBadge=a.evoSt==='evolucao'?'badge-neon':a.evoSt==='regressao'?'badge-red':'badge-orange';

  const r=34,cx=40,cy=40,circ=2*Math.PI*r,offset=circ-(a.score/100)*circ;
  const ring=`<svg width="80" height="80" viewBox="0 0 80 80"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="6"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${sc.c}" stroke-width="6" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg>`;

  let html=`<div style="padding-top:8px;margin-bottom:14px">
    <div style="font-size:18px;font-weight:700;letter-spacing:-.3px">📊 Análise do Treino</div>

      </div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:14px;font-weight:700">${a.analysis.esforcoEmoji} ${a.analysis.esforcoLabel}</span>
        </div>
        <div style="font-size:12px;color:var(--tx2);line-height:1.6">${a.analysis.esforcoDesc}</div>

    </div>

        ${USER_GOAL.test_fcmax?`<span style="font-size:11px;color:var(--tx2)">· FCmax: ${USER_GOAL.test_fcmax}bpm</span>`:''}

    </div>`;

    <div class="clabel">💬 Mensagem do treinador</div>
    <div style="font-size:14px;line-height:1.8;color:var(--tx)">${a.analysis.coachMsg}</div>
    ${a.evoDetails?`<div style="font-size:11px;color:var(--tx2);margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)">📊 Evolução: ${a.evoDetails}</div>`:''}

  </div>`;

  // O que você fez bem
  html+=`<div class="card">
    <div class="clabel" style="color:var(--neon)">👍 O que você fez bem</div>`;
  a.analysis.pontosBons.forEach((p,i)=>{
    html+=`<div style="padding:10px 0;border-bottom:1px solid var(--bd)">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">${i+1}. ${p.titulo}</div>
      <div style="font-size:13px;color:var(--tx);margin-bottom:4px;line-height:1.6">${p.texto}</div>
      <div style="font-size:12px;color:var(--neon);line-height:1.5">➡️ ${p.dica}</div>
    </div>`;
  });
  html+=`</div>`;

  // O que melhorar
  html+=`<div class="card">
    <div class="clabel" style="color:var(--orange)">⚠️ O que melhorar</div>`;
  a.analysis.melhorar.forEach((m,i)=>{
    html+=`<div style="padding:10px 0;border-bottom:1px solid var(--bd)">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">${i+1}. ${m.titulo}</div>
      <div style="font-size:13px;color:var(--tx2);margin-bottom:6px;line-height:1.6">${m.problema}</div>
      <div style="background:var(--bg3);border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--tx);line-height:1.6;border-left:3px solid var(--neon)">
        ${m.icon} <strong>Como fazer:</strong> ${m.solucao}
      </div>
    </div>`;
  });
  html+=`</div>`;

  // Zones — simple version
  html+=`<div class="card">
    <div class="clabel">🏃 Seus ritmos de treino</div>
    <div style="font-size:12px;color:var(--tx2);margin-bottom:10px">Use esses ritmos como referência nos próximos treinos:</div>`;
  Object.values(a.z).forEach(zv=>{
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r);margin-bottom:5px;background:${zv.bg}">
      <span style="font-size:16px">${zv.emoji}</span>
      <div style="flex:1">

      </div>
      <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:${zv.color}">${sp(zv.min)}–${sp(zv.max)}</div>
    </div>`;
  });
  html+=`</div>`;

  // Splits if available
  if(a.last.splits&&a.last.splits.length>1){
    const sv=a.last.splits.map(ps),mn=Math.min(...sv);
    html+=`<div class="card"><div class="clabel">⏱ Ritmo por km</div>

function renderIAText(text){
  // Convert markdown headings and lists to styled HTML
  const lines = text.split('\n');
  let html = '<div style="font-size:13px;line-height:1.8;color:var(--tx)">';

  for(const line of lines){
    const t = line.trim();
    if(!t){ html += '<div style="height:6px"></div>'; continue; }

    // H1-style: # emoji TÍTULO
    if(/^# [🧠👍⚠️🔍📈🚨🎯🏃📅📊]/.test(t)){
      const title = t.replace(/^# /,'');
      html += `<div style="font-size:14px;font-weight:700;color:var(--neon);margin:16px 0 6px;padding:8px 12px;background:rgba(255,92,0,.06);border-radius:var(--r);border-left:3px solid var(--neon)">${title}</div>`;
    }
    // Bold **text**
    else if(t.startsWith('**') && t.endsWith('**')){
      html += `<div style="font-weight:700;color:var(--tx);margin:4px 0">${t.replace(/\*\*/g,'')}</div>`;
    }
    // Bullet - text
    else if(t.startsWith('- ') || t.startsWith('• ')){
      const item = t.replace(/^[-•] /,'');
      const colored = item.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--neon)">$1</strong>');
      html += `<div style="display:flex;gap:8px;padding:3px 0;padding-left:8px"><span style="color:var(--neon);flex-shrink:0">›</span><span>${colored}</span></div>`;
    }
    // Numbered list
    else if(/^\d+\. /.test(t)){
      const num = t.match(/^(\d+)\. /)[1];
      const item = t.replace(/^\d+\. /,'').replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--neon)">$1</strong>');
      html += `<div style="display:flex;gap:8px;padding:3px 0;padding-left:8px"><span style="color:var(--orange);font-weight:700;flex-shrink:0;font-family:var(--mono);font-size:11px">${num}.</span><span>${item}</span></div>`;
    }
    // Zone lines (Z1/Z2/Z3)
    else if(/Z[123]/.test(t) && t.includes('min/km')){
      const colored = t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
      html += `<div style="padding:6px 12px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--bd);margin:3px 0;font-family:var(--mono);font-size:12px">${colored}</div>`;
    }
    // Score line
    else if(/score|nota|pontos?/i.test(t) && /\d{2,3}/.test(t)){
      const score = t.match(/\d{2,3}/)?.[0];
      const color = score>=90?'var(--neon)':score>=70?'var(--teal)':score>=50?'var(--orange)':'var(--red)';
      html += `<div style="font-size:16px;font-weight:700;color:${color};padding:4px 0">${t.replace(/\*\*/g,'')}</div>`;
    }
    // Regular paragraph
    else {
      const colored = t.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--neon)">$1</strong>');
      html += `<div style="margin:2px 0">${colored}</div>`;
    }
  }

  html += '</div>';
  return html;
}

// ─── Render plan from AI JSON ───────────────────────────────────
function estimateWorkoutTime(descricao, zona){
  // Rough time estimate in minutes based on description
  if(!descricao || zona==='OFF') return 0;
  let mins = 0;
  // Parse km mentions
  const kmMatches = descricao.matchAll(/(\d+(?:\.\d+)?)km/g);
  for(const m of kmMatches) {
    const km = parseFloat(m[1]);
    const paceSec = zona==='Z3'?380 : zona==='Z2'?420 : 480;
    mins += (km * paceSec) / 60;
  }
  // Parse repetition patterns like 10×200m
  const repMatches = descricao.matchAll(/(\d+)[×x](\d+)m/g);
  for(const m of repMatches) {
    const reps = parseInt(m[1]), dist = parseInt(m[2]);
    const km = (reps * dist) / 1000;
    const restMins = reps * 1.5; // avg rest
    mins += (km * 350/60) + restMins;
  }
  return mins > 0 ? Math.round(mins) : 0;
}

function parsePaceRange(paceStr, zona, segDesc){
  // Strides / tiros em subida / sprints curtos — mostrar esforço, não pace
  // (pace de 60m ou 200m em min/km seria absurdo)
  const isStride = segDesc && /veloc|strides|subida|sprint|80m|60m/i.test(segDesc);
  if(isStride) return 'máx. esforço';

  if(!paceStr || paceStr==='—') return '';
  // If it's already labeled as "veloc. máxima" etc, just show effort
  if(/veloc|máximo|máx/i.test(paceStr)) return 'máx. esforço';

  // Parse the pace string
  let cleanPace = paceStr.replace(/[^\d:]/g,'').trim();
  if(!cleanPace.includes(':')) return '';
  const sec = t2s(cleanPace);
  // Sanity check — pace must be between 2:00 and 20:00 min/km
  if(!sec || sec < 120 || sec > 1200) return '';
  const pct = zona==='Z3'?0.04 : zona==='Z2'?0.05 : 0.08;
  const lo = Math.round(sec*(1-pct));
  const hi = Math.round(sec*(1+pct));
  return sp(lo)+' – '+sp(hi);
}

function parseWorkoutBlocks(descricao, paceStr, zona){
  if(!descricao) return [];
  const blocks = [];
  const zoneColor = zona==='Z1'?'var(--teal)':zona==='Z2'?'var(--orange)':zona==='Z3'?'var(--red)':'var(--teal)';

  // Split by + (main separator between workout blocks)
  const parts = descricao.split(/\s*\+\s*/);

  parts.forEach(part => {
    part = part.trim();
    if(!part) return;

    // Split main effort from rest info by comma
    // e.g. "8x400m ritmo 6:41, 1min caminhando" -> ["8x400m ritmo 6:41","1min caminhando"]
    const commaParts = part.split(/,\s*/);
    const mainPart = commaParts[0].trim();
    const restPart = commaParts.slice(1).join(', ').trim();

    // Extract pace only from mainPart
    const paceMatch = mainPart.match(/(\d+:\d+)/);
    let segPace = paceMatch ? paceMatch[1] : '';
    let segDesc = mainPart.replace(/\d+:\d+/g,'').replace(/\s+/g,' ').trim();
    segDesc = segDesc.replace(/\/km$/i,'').replace(/min\/km$/i,'').trim();

    // Detect zone
    let segZona = zona;
    if(/aquec|warm/i.test(segDesc)) segZona='Z1';
    else if(/\bleve\b|desaquec/i.test(segDesc)) segZona='Z1';
    else if(/\britmo\b|tempo run|ritmado/i.test(segDesc) && !/tiro|sprint|veloc/i.test(segDesc)) segZona='Z2';
    else if(/tiro|veloc|sprint|strides|1000m|400m|200m|80m|60m/i.test(segDesc)) segZona='Z3';

    const segColor = segZona==='Z1'?'var(--teal)':segZona==='Z2'?'var(--orange)':segZona==='Z3'?'var(--red)':'var(--tx2)';
    let finalPace = segPace ? parsePaceRange(segPace, segZona, segDesc) : '';
    // Non-running segments — no zone, no pace
    const isNonRunning = /alongamento|aquecimento muscular|fortalec|mobilidade|flexib|estatic|ativ/i.test(segDesc);
    if(isNonRunning){
      blocks.push({desc:segDesc, pace:'', color:'var(--tx3)', zona:'', isNonRunning:true});
      if(restPart && /caminh|recup|descanso|trote|rest|jog/i.test(restPart)){
        const restClean = restPart.replace(/\d+:\d+/g,'').replace(/\s+/g,' ').trim();
        blocks.push({desc:'↩ descanso: '+restClean, pace:'', color:'var(--tx3)', zona:'Z1', isRest:true});
      }
      return; // skip normal push below
    }

    if(!finalPace && segZona==='Z1') finalPace = 'Z1 confortável';

    blocks.push({desc:segDesc, pace:finalPace, color:segColor, zona:segZona});

    // Add rest as a separate dimmed row
    if(restPart && /caminh|recup|descanso|trote|rest|jog/i.test(restPart)){
      const restClean = restPart.replace(/\d+:\d+/g,'').replace(/\s+/g,' ').trim();
      blocks.push({desc:'↩ descanso: '+restClean, pace:'', color:'var(--tx3)', zona:'Z1', isRest:true});
    }
  });

  return blocks.length>0 ? blocks : [{desc:descricao, pace:parsePaceRange(paceStr,zona,descricao), color:zoneColor, zona}];
}

function renderWorkoutCell(t, col, cls){
  if(!t || (t.zona||'OFF').toUpperCase()==='OFF'){
    return '<td class="ps-off">OFF</td>';
  }
  const zona=(t.zona||'Z1').toUpperCase().replace('LONGÃO','LONGAO');
  const blocks = parseWorkoutBlocks(t.descricao, t.pace, zona);
  const zclass = {'Z1':'ps-z1','Z2':'ps-z2','Z3':'ps-z3','LONGAO':'ps-long','LONG':'ps-long','FORT':'ps-fort'}[zona]||'ps-z1';
  const ztopColor = {'Z1':'var(--neon)','Z2':'var(--orange)','Z3':'var(--red)','LONGAO':'var(--teal)','LONG':'var(--teal)','FORT':'var(--purple)'}[zona]||'var(--neon)';

  let inner = `<div class="ps-type" style="color:${ztopColor}">${t.tipo||zona}</div>`;
  blocks.forEach(b => {
    if(b.isRest){
      inner += `<div class="ps-block" style="opacity:.55">
        <span class="ps-bdesc" style="color:var(--tx3);font-style:italic">${b.desc}</span>
      </div>`;
    } else if(b.isNonRunning){
      inner += `<div class="ps-block">
        <span class="ps-bdesc" style="color:var(--tx2)">${b.desc}</span>
        <span class="ps-bpace" style="color:var(--tx3);font-size:9px">—</span>
      </div>`;
    } else {
      inner += `<div class="ps-block">
        <span class="ps-bdesc">${b.desc}</span>
        ${b.pace?`<span class="ps-bpace" style="color:${b.color}">${b.pace}</span>`:''}
      </div>`;
    }
  });

  return `<td class="${zclass}" onclick="openDayModal(this)" data-treino='${JSON.stringify(t).replace(/'/g,"\'")}'>
    ${inner}
  </td>`;
}

// ─── Default rule-based plan spreadsheet ────────────────────────
function renderDefaultPlanSheet(a, dias){
  const z=a.z;
  const bp=a.basePace;
  const tp=a.tp||bp;
  const tempoMin = USER_GOAL?.tempo_treino || 45;
  const tempoLongao = USER_GOAL?.tempo_longao || 0;
  const vam_pace_str = USER_GOAL?.vam_pace ? sp(USER_GOAL.vam_pace)+'/km' : (z._vam?.pace?sp(z._vam.pace)+'/km':'não calculada'); // 0 = livre

  // ── PACE ZONES ──
  const pAq   = z.e ? sp(z.e.max) : sp(Math.round(bp*1.28));
  const pBase = z.e ? sp(z.e.min) : sp(Math.round(bp*1.12));
  const pTempo= z.t ? sp(z.t.min) : sp(Math.round(bp*0.94));
  const pForte= z.i ? sp(z.i.min) : sp(Math.round(bp*0.86));
  const pSprint= z.r ? sp(z.r.min): sp(Math.round(bp*0.78));

  // ── VOLUME CALCULATION based on pace and available time ──
  // sec/km * km = total seconds, must fit in tempoMin*60
  const paceZ1sec = z.e ? (z.e.min+z.e.max)/2 : bp*1.18;
  const paceZ2sec = z.t ? (z.t.min+z.t.max)/2 : bp*0.98;
  const paceZ3sec = z.i ? (z.i.min+z.i.max)/2 : bp*0.89;

  // Overhead: warmup 2km + cooldown 1km at Z1 pace
  const overheadSec = (2+1) * paceZ1sec;
  const availForWork = tempoMin*60 - overheadSec;

  // Base: how many km can fit in available time at Z1?
  const baseKm = Math.max(2, Math.round(availForWork/paceZ1sec * 10)/10);
  // Tempo run: km at Z2 pace that fit
  const tempoKm = Math.max(2, Math.round(availForWork/paceZ2sec * 10)/10);
  // Intervals: how many reps fit? (each rep 400m Z3 + 90s rest)
  const secPerRep400 = (0.4 * paceZ3sec) + 90;
  const reps400 = Math.max(4, Math.min(10, Math.floor(availForWork / secPerRep400)));
  const reps1000 = Math.max(3, Math.min(6, Math.floor(availForWork / (1*paceZ3sec + 150))));
  const reps200 = Math.max(6, Math.min(14, Math.floor(availForWork / (0.2*paceZ3sec + 75))));
  const repsStrides = Math.max(6, Math.min(12, Math.floor(availForWork / (0.06*paceZ3sec*0.5 + 90))));

  // Longão: based on actual max distance done, +10% progression, NO time limit
  const maxDistDone = a.h.length ? Math.max(...a.h.map(w=>w.dist)) : (a.obj?.dist||5)*0.5;
  // Cap longão increase: max +10% per week, never more than obj dist
  const longaoBase = Math.max(maxDistDone, 4);

  // ── USER'S SELECTED DAYS ──
  const allDays = ['seg','ter','qua','qui','sex','sab','dom'];
  const userDays = (USER_GOAL?.dias_selecionados && USER_GOAL.dias_selecionados.length>0)
    ? USER_GOAL.dias_selecionados
    : ['ter','qui','dom'].slice(0, USER_GOAL?.dias_semana||3);

  const lastDay = userDays[userDays.length-1];   // longão
  const firstDay = userDays[0];                   // base
  const middleDays = userDays.slice(1,-1);        // quality

  const qualTypes = ['STRIDES','INTERVALADO','INTERVALO_LONGO','INTERVALADO'];

  function buildTreino(type, semIdx){
    const longaoKm = Math.round(longaoBase * Math.pow(1.1, semIdx) * 10)/10;
    const longaoCapped = Math.min(longaoKm, a.obj?.dist||10); // never exceed target dist
    const pLongao = sp(Math.round(bp * (1.06 + semIdx*0.01)));

    const map = {
      'BASE': {
        tipo:'BASE', zona:'Z1', pace:pBase,
        descricao:`2km aquec ${pAq} + ${baseKm}km ritmo ${pBase} + 1km leve`,
        note:`${tempoMin}min · Z1 base aeróbica`
      },
      'STRIDES': {
        tipo:'STRIDES', zona:'Z3', pace:'veloc. máxima',
        descricao:`2km aquec ${pAq} + ${repsStrides}×60m veloc. máxima subida, 1:30 caminhando de volta + 1km leve`,
        note:`${tempoMin}min · Força neuromuscular`
      },
      'INTERVALADO': {
        tipo:'INTERVALADO', zona:'Z3', pace:pForte,
        descricao:`2km aquec ${pAq} + ${reps400}×400m ritmo ${pForte}, 1:30 caminhando + 1km leve`,
        note:`${tempoMin}min · VO2max`
      },
      'INTERVALO_LONGO': {
        tipo:'INTERVALADO LONGO', zona:'Z3', pace:pForte,
        descricao:`2km aquec ${pAq} + ${reps1000}×1000m ritmo ${pForte}, 2:30 trotando + 1km leve`,
        note:`${tempoMin}min · Limiar`
      },
      'TEMPO': {
        tipo:'TEMPO RUN', zona:'Z2', pace:pTempo,
        descricao:`2km aquec ${pAq} + ${tempoKm}km ritmo ${pTempo} + 1km leve`,
        note:`${tempoMin}min · Limiar láctico`
      },
      'LONGAO': {
        tipo:'LONGÃO', zona:'LONGAO', pace:pLongao,
        descricao:`1km aquec + ${longaoCapped}km ritmo ${pLongao} + 1km leve`,
        note:`Sem limite de tempo · +10% por semana`
      },
      'OFF': {tipo:'OFF', zona:'OFF', descricao:'Descanso', pace:''},
    };
    return map[type] || map['OFF'];
  }

  const focos = [
    'Adaptação ao treino polarizado',
    'Introdução aos intervalados Z3',
    'Qualidade e especificidade',
    'Consolidação e progressão'
  ];
  const notas = [
    `Base aeróbica. Todos os treinos dentro de ${tempoMin}min. Longão sem limite.`,
    `Intervalados introduzidos com cuidado. Pace Z3 fiel às zonas do teste.`,
    `Aumento de repetições. Longão progressivo +10%.`,
    `Semana de consolidação. Avalie evolução e gere plano IA para próximas 4 semanas.`
  ];

  const plan = {semanas: [0,1,2,3].map(si => {
    const treinos = {};
    allDays.forEach(d => { treinos[d] = buildTreino('OFF', si); });
    treinos[firstDay] = buildTreino('BASE', si);
    middleDays.forEach((d,mi) => {
      treinos[d] = buildTreino(qualTypes[si % qualTypes.length], si);
    });
    treinos[lastDay] = buildTreino('LONGAO', si);
    return { semana:si+1, foco:focos[si], nota:notas[si], treinos };
  })};

  window._defaultPlan = plan;
  return renderPlanSheet(plan, a);
}

function buildProgNarr(pd,pct,n,a){
  if(pct>=100)return`🎉 Objetivo atingido! De ${sp(HIST[0].paceSec)} para ${sp(a.basePace)}/km em ${n} treinos. Hora de definir um novo desafio!`;
  if(pct>=75)return`Reta final! Faltam ${sp(a.gapSec)}/km para o alvo. Mantenha a consistência.`;
  if(pct>=50)return`Mais da metade do caminho. Melhorou ${sp(Math.abs(pd))}/km em ${n} treinos. As semanas 6–12 costumam mostrar os maiores saltos.`;
  if(pct>=25)return`Boa evolução inicial. Adaptações aeróbicas levam 8–12 semanas para aparecer plenamente (Hawley & Holloszy, 2009). Continue.`;
  return pd>0?`Você melhorou ${sp(pd)}/km desde o início. Com mais dados, as projeções de prazo ficam mais precisas.`:`Dados insuficientes para projeção sólida. Insira pelo menos 5 treinos.`;
}

// ═══════════════════════════════════════════════════
//  UTILITY — pace / time helpers
// ═══════════════════════════════════════════════════
function sp(secs){
  if(!secs||isNaN(secs)||secs<=0) return '—';
  const m=Math.floor(secs/60),s=Math.round(secs%60);
  return `${m}:${String(s).padStart(2,'0')}`;
}
function ps(str){
  if(!str||typeof str!=='string') return 0;
  const p=str.trim().split(':');
  if(p.length===2) return parseInt(p[0])*60+parseInt(p[1]);
  if(p.length===3) return parseInt(p[0])*3600+parseInt(p[1])*60+parseInt(p[2]);
  return 0;
}
function t2s(str){
  if(!str) return 0;
  const p=str.trim().split(':');
  if(p.length===2) return parseInt(p[0])*60+parseInt(p[1]);
  if(p.length===3) return parseInt(p[0])*3600+parseInt(p[1])*60+parseInt(p[2]);
  return 0;
}
function s2t(secs){
  if(!secs||secs<=0) return '—';
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=Math.round(secs%60);
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════
//  COMPUTE ANALYSIS
// ═══════════════════════════════════════════════════
function computeAnalise(){
  if(!USER_GOAL||!USER_GOAL.onboard_done) return null;
  const h=HIST; const n=h.length; if(n===0) return null;
  const obj=OBJS.find(o=>o.id===USER_GOAL.obj_id)||OBJS[0];
  const last=h[n-1];

  // ── PACE BASE: mediana dos treinos recentes (mais robusto que média) ──
  const recent=h.slice(-8).filter(w=>w.paceSec>120&&w.paceSec<900);
  let basePace = last.paceSec;
  if(recent.length >= 2){
    const sorted = recent.map(w=>w.paceSec).sort((a,b)=>a-b);
    basePace = sorted[Math.floor(sorted.length/2)];
  }

  // ── TENDÊNCIA DE EVOLUÇÃO (compara blocos de treinos) ──
  let evoSt='estavel', evoMag=0, evoDetails='';
  if(n>=4){
    const block1 = h.slice(0, Math.floor(n/2)).filter(w=>w.paceSec>0);
    const block2 = h.slice(Math.floor(n/2)).filter(w=>w.paceSec>0);
    if(block1.length>0 && block2.length>0){
      const avg1 = block1.reduce((a,w)=>a+w.paceSec,0)/block1.length;
      const avg2 = block2.reduce((a,w)=>a+w.paceSec,0)/block2.length;
      evoMag = avg1 - avg2; // positive = improving (faster)
      const pctChange = Math.round(Math.abs(evoMag)/avg1*100);
      if(evoMag > 15)     { evoSt='evolucao';  evoDetails=`${sp(Math.abs(evoMag))}/km mais rápido (${pctChange}% evolução)`; }
      else if(evoMag < -20){ evoSt='regressao'; evoDetails=`${sp(Math.abs(evoMag))}/km mais lento`; }
      else                  { evoDetails='ritmo estável'; }
    }
  } else if(n>=2){
    const older = h.slice(0,-1).map(w=>w.paceSec).filter(v=>v>0);
    const prevAvg = older.reduce((a,b)=>a+b,0)/older.length;
    evoMag = prevAvg - last.paceSec;
    if(evoMag > 10)      { evoSt='evolucao';  evoDetails=`Último treino ${sp(Math.abs(evoMag))}/km mais rápido`; }
    else if(evoMag < -15){ evoSt='regressao'; evoDetails=`Último treino ${sp(Math.abs(evoMag))}/km mais lento`; }
  }

  // ── ZONAS: calibradas pelo TESTE + refinadas pelos treinos reais ──
  let z = {};
  if(USER_GOAL.test_time){
    z = calcZonesFromTest(USER_GOAL.test_time, USER_GOAL.test_fcmax||0) || {};
  }
  if(!z||!z.e){
    // Fallback sem teste: baseado no pace atual
    z = {
      e:{min:Math.round(basePace*1.12),max:Math.round(basePace*1.28),label:'Z1 — Base aeróbica',emoji:'🟢',desc:'Conversa normal.',color:'var(--teal)',bg:'var(--teal-dim)'},
      m:{min:Math.round(basePace*1.04),max:Math.round(basePace*1.11),label:'Z1+ — Leve/Longão',emoji:'🔵',desc:'Frases curtas.',color:'#4da6ff',bg:'rgba(77,166,255,.08)'},
      t:{min:Math.round(basePace*0.94),max:Math.round(basePace*1.03),label:'Z2 — Limiar',emoji:'🟡',desc:'Difícil, sustentável.',color:'var(--orange)',bg:'var(--orange-dim)'},
      i:{min:Math.round(basePace*0.86),max:Math.round(basePace*0.93),label:'Z3 — VO2max',emoji:'🔴',desc:'Muito difícil.',color:'var(--red)',bg:'var(--red-dim)'},
      r:{min:Math.round(basePace*0.78),max:Math.round(basePace*0.85),label:'Z3+ — Sprint',emoji:'💀',desc:'Tiros curtos máximos.',color:'var(--purple)',bg:'var(--purple-dim)'},
    };
  }

  // ── DRIFT CARDÍACO: detectar overtraining/fadiga ──
  let driftAlert = null;
  if(n >= 3 && last.fcmed > 0){
    const prevWithFC = h.slice(-6,-1).filter(w=>w.fcmed>0&&w.paceSec>0);
    if(prevWithFC.length >= 2){
      const prevEfficiency = prevWithFC.map(w=>w.fcmed/w.paceSec);
      const avgPrevEff = prevEfficiency.reduce((a,b)=>a+b,0)/prevEfficiency.length;
      const curEff = last.fcmed/last.paceSec;
      const drift = (curEff - avgPrevEff)/avgPrevEff;
      if(drift > 0.08) driftAlert = {type:'fadiga', msg:`FC ${Math.round(drift*100)}% acima do esperado para esse ritmo — sinal de fadiga acumulada`};
      else if(drift < -0.08) driftAlert = {type:'melhora', msg:`FC ${Math.round(Math.abs(drift)*100)}% abaixo do esperado — coração mais eficiente, ótima evolução!`};
    }
  }

  // ── CONSISTÊNCIA ──
  let consistency = 0;
  if(n >= 4){
    const intervals = [];
    for(let i=1;i<Math.min(n,8);i++){
      const d1 = new Date(h[i-1].data.split('/').reverse().join('-'));
      const d2 = new Date(h[i].data.split('/').reverse().join('-'));
      if(!isNaN(d1)&&!isNaN(d2)) intervals.push((d2-d1)/(86400000));
    }
    if(intervals.length > 0){
      const avgGap = intervals.reduce((a,b)=>a+b,0)/intervals.length;
      const targetGap = 7 / (USER_GOAL?.dias_semana||3); // expected days between workouts
      consistency = Math.max(0, Math.min(100, Math.round(100 - Math.abs(avgGap-targetGap)/targetGap*50)));
    }
  }

  // ── SCORE ──
  let score = 40;
  if(n >= 3)  score += 10;
  if(n >= 7)  score += 5;
  if(evoSt==='evolucao')  score += 20;
  if(evoSt==='regressao') score -= 15;
  if(last.fcmed>0 && last.fcmed<165) score += 8;
  if(last.dist >= obj.dist*0.6)  score += 8;
  if(last.splits&&last.splits.length>1) score += 5;
  if(consistency > 70) score += 8;
  if(driftAlert?.type==='melhora') score += 5;
  if(driftAlert?.type==='fadiga')  score -= 10;
  score = Math.max(10, Math.min(99, score));

  // ── PROGRESSO RUMO AO OBJETIVO ──
  const tp = USER_GOAL.target_pace_sec || (USER_GOAL.target_pace ? ps(USER_GOAL.target_pace) : 0);
  const startPace = h[0].paceSec;
  let progPct=0, gapSec=0;
  if(tp>0){
    gapSec = Math.max(0, basePace - tp);
    const totalGap = Math.max(1, startPace - tp);
    progPct = Math.min(100, Math.round((startPace - basePace) / totalGap * 100));
  }

  // ── ESTIMATIVA DE TEMPO NA PROVA ──
  // Riegel formula: T2 = T1 × (D2/D1)^1.06
  let raceEst = '';
  if(obj.dist>0 && basePace>0){
    // Use test as reference if available
    if(USER_GOAL.test_time && USER_GOAL.test_dist){
      const testSecs = t2s(USER_GOAL.test_time);
      const testDist = USER_GOAL.test_dist||3;
      const raceTimeSec = testSecs * Math.pow(obj.dist/testDist, 1.06);
      raceEst = s2t(Math.round(raceTimeSec));
    } else {
      raceEst = s2t(Math.round(basePace * obj.dist * 1.08));
    }
  }

  // ── ETA ──
  // Based on actual improvement rate
  let weeksETA = obj.weeks || 12;
  if(tp>0 && gapSec>0 && n>=4){
    const improvTotal = startPace - basePace;
    const weeksElapsed = Math.max(1, n / (USER_GOAL?.dias_semana||3));
    const improvPerWeek = improvTotal / weeksElapsed;
    weeksETA = improvPerWeek > 0 ? Math.ceil(gapSec / improvPerWeek) : obj.weeks;
    weeksETA = Math.min(weeksETA, obj.weeks * 2); // cap at 2x expected
  }
  const etaD = new Date();
  etaD.setDate(etaD.getDate() + weeksETA * 7);
  const etaDate = etaD.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});

  const analysis = buildHumanAnalysis(last, basePace, evoSt, evoMag, obj, n, h);

  return {last, h, n, score, evoSt, evoMag, evoDetails, basePace, z, obj,
          tp, gapSec, progPct, raceEst, weeksETA, etaDate,
          consistency, driftAlert, analysis};
}

async function doSaveTreino(){
  const data=document.getElementById('t-data')?.value;
  const dist=parseFloat(document.getElementById('t-dist')?.value);
  const tempo=document.getElementById('t-tempo')?.value?.trim();
  let pace=document.getElementById('t-pace')?.value?.trim();

  if(!data||!dist||dist<=0){showSaveMsg('Informe pelo menos a data e a distância.','err');return;}
  if(!pace&&tempo){const d=t2s(tempo);if(d>0)pace=sp(Math.round(d/dist));}
